    input:-webkit-autofill,
    input:-webkit-autofill:hover,

    input:-webkit-autofill:active{
        -webkit-box-shadow: 0 0 0 30px #111417 inset !important;

</style>
</head>

    <div class="flex items-center justify-end gap-4 w-1/4">

            </div>
        </div>
    </div>
</header>

<div class="flex pt-20 min-h-screen">
    <aside class="fixed left-0 top-0 h-full w-64 bg-[#080a0d] flex flex-col z-40 shadow-[24px_0_48px_rgba(0,0,0,0.4)] pt-24 overflow-y-auto border-r border-white/5">
        
        <div class="px-6 mb-6">
            <h3 class="font-headline font-black text-[var(--game-color)] uppercase text-xs tracking-widest mb-4 transition-colors">Market Universe</h3>
            <div class="space-y-2">
                <button id="btn-ygo" onclick="setMarketGame('ygo')" class="w-full text-left bg-slate-900 text-[#69daff] border-r-4 border-[#69daff] px-4 py-3 flex items-center gap-3 text-sm font-bold transition-all rounded-l-lg shadow-md">
                    <span class="material-symbols-outlined text-sm">auto_awesome</span> Yu-Gi-Oh!
                </button>
                <button id="btn-pkmn" onclick="setMarketGame('pkmn')" class="w-full text-left text-slate-500 hover:bg-yellow-900/20 hover:text-[#ffcb05] border-r-4 border-transparent px-4 py-3 flex items-center gap-3 text-sm font-medium transition-all rounded-l-lg">
                    <span class="material-symbols-outlined text-sm">bolt</span> Pokémon
                </button>
                <button id="btn-mtg" onclick="setMarketGame('mtg')" class="w-full text-left text-slate-500 hover:bg-orange-900/20 hover:text-[#ff7a00] border-r-4 border-transparent px-4 py-3 flex items-center gap-3 text-sm font-medium transition-all rounded-l-lg">
                    <span class="material-symbols-outlined text-sm">castle</span> Magic: TG
                </button>
            </div>
        </div>

        <div class="px-6 space-y-6 mb-8">
            <div id="dynamicCategoryFilters"></div>
            <div>
                <label class="font-headline font-black text-slate-500 uppercase text-[10px] tracking-widest mb-2 block">Preferences</label>
                <select id="preferenceSelect" onchange="applyFilters()" class="w-full bg-[#111417] text-white text-xs font-bold border border-white/10 rounded-lg px-3 py-2.5 focus:ring-1 focus:ring-[var(--game-color)] outline-none cursor-pointer"></select>
            </div>
            <div>
                <label class="font-headline font-black text-slate-500 uppercase text-[10px] tracking-widest mb-2 block">Rarity Tier</label>
                <select id="raritySelect" onchange="applyFilters()" class="w-full bg-[#111417] text-[var(--game-color)] text-xs font-bold border border-white/10 rounded-lg px-3 py-2.5 focus:ring-1 focus:ring-[var(--game-color)] outline-none cursor-pointer"></select>
            </div>
        </div>

        <div class="px-6 mt-auto mb-8">
            <div class="bg-surface-container-low p-4 rounded-lg border border-white/5">
                <p class="text-[10px] uppercase font-label text-slate-500 tracking-widest mb-2">Data Source</p>
                <p id="dataSourceLabel" class="text-xs font-bold text-white flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> TCGPlayer API
                </p>
            </div>
        </div>
    </aside>

    <main class="ml-64 flex-1 px-10 py-10 max-w-screen-2xl">
        <header class="mb-10 flex justify-between items-end">
            <div>
                <div class="flex items-center gap-3 mb-2">
                    <span class="font-label uppercase text-[10px] text-[var(--game-color)] tracking-widest bg-[var(--game-color)]/10 px-2 py-1 rounded border border-[var(--game-color)]/20 transition-colors">LIVE MARKET</span>
                    <span id="searchStatus" class="text-slate-400 text-xs font-label uppercase tracking-widest">Global Index Ranking</span>
                </div>
                <h1 id="marketTitle" class="font-headline text-5xl font-black text-white tracking-tighter">Yu-Gi-Oh! Market</h1>
            </div>
            <div id="activeFiltersBadge" class="hidden flex items-center gap-2 bg-surface-container-low px-4 py-2 rounded-full text-xs font-bold border border-outline-variant/10 text-[var(--game-color)]">
                <span class="material-symbols-outlined text-sm">filter_alt_off</span> 
                <span id="activeFiltersText">Filtered</span>
                <button onclick="resetFilters()" class="ml-2 hover:text-white" title="Clear Filters">×</button>
            </div>
        </header>

        <div id="resultsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            <div class="col-span-full py-20 flex flex-col items-center justify-center text-slate-500">
                <span class="material-symbols-outlined text-6xl mb-4 opacity-50 text-[var(--game-color)]">manage_search</span>
                <p class="font-headline text-xl">Start typing to fetch live market data.</p>
                <p class="text-sm mt-2 opacity-60">Fuzzy search & Multi-dimensional filters active!</p>
            </div>
        </div>
    </main>
</div>

<script>
    const gameConfig = {
        ygo: { name: "Yu-Gi-Oh!", color: "#69daff", source: "TCGPlayer API" },
        pkmn: { name: "Pokémon", color: "#ffcb05", source: "Pokémon TCG API" },
        mtg: { name: "Magic: TG", color: "#ff7a00", source: "Scryfall API" }
    };

    const filterOptions = {
        ygo: {
            categories: ['All', 'Monsters', 'Spells', 'Traps'],
            preferences: ['All Attributes', 'Dragon', 'Spellcaster', 'Warrior', 'Fiend', 'Machine', 'Fairy', 'Zombie'],
            rarities: ['All Rarities', 'Common', 'Rare', 'Super Rare', 'Ultra Rare', 'Secret Rare', 'Ultimate Rare', 'Starlight Rare', 'Ghost Rare']
        },
        pkmn: {
            categories: ['All', 'Pokémon', 'Trainers', 'Energies'],
            preferences: ['All Types', 'Colorless', 'Darkness', 'Dragon', 'Fairy', 'Fighting', 'Fire', 'Grass', 'Lightning', 'Metal', 'Psychic', 'Water'],
            rarities: ['All Rarities', 'Common', 'Uncommon', 'Rare', 'Rare Holo', 'Ultra Rare', 'Illustration Rare', 'Special Illustration Rare', 'Secret Rare']
        },
        mtg: {
            categories: ['All', 'Creatures', 'Instants/Sorceries', 'Lands', 'Artifacts', 'Enchantments', 'Planeswalkers'],
            preferences: ['All Colors', 'White', 'Blue', 'Black', 'Red', 'Green', 'Colorless'],
            rarities: ['All Rarities', 'Common', 'Uncommon', 'Rare', 'Mythic']
        }
    };

    let activeMarketGame = 'ygo';
    let activeCategory = 'All'; 
    let searchTimeout = null;
    let latestFetchedData = [];

    function parseCardData(game, apiCard) {
        let parsed = {
            id: apiCard.id,
            name: apiCard.name,
            img: '',
            category: 'Other',
            preference: 'None',
            rarities: [], 
            displayRarity: 'Common',
            price: "0.00",
            rawSets: [] 
        };

        if (game === 'ygo') {
            parsed.img = apiCard.card_images[0].image_url;
            parsed.price = apiCard.card_prices[0]?.tcgplayer_price || "0.00";
            parsed.preference = apiCard.race || 'None';
            
            const t = apiCard.type.toLowerCase();
            if (t.includes('spell')) parsed.category = 'Spells';
            else if (t.includes('trap')) parsed.category = 'Traps';
            else parsed.category = 'Monsters';

            if(apiCard.card_sets) {
                parsed.rawSets = apiCard.card_sets; 
                parsed.rarities = apiCard.card_sets.map(s => s.set_rarity);
                parsed.displayRarity = parsed.rarities[0]; 
            } else {
                parsed.displayRarity = parsed.category;
            }
        } 
        else if (game === 'pkmn') {
            parsed.img = apiCard.images.large || apiCard.images.small;
            parsed.price = apiCard.tcgplayer?.prices?.holofoil?.market || apiCard.tcgplayer?.prices?.normal?.market || "0.00";
            
            const t = apiCard.supertype.toLowerCase();
            if (t.includes('pokémon')) parsed.category = 'Pokémon';
            else if (t.includes('trainer')) parsed.category = 'Trainers';
            else if (t.includes('energy')) parsed.category = 'Energies';

            parsed.preference = apiCard.types ? apiCard.types[0] : 'Colorless';
            parsed.rarities = [apiCard.rarity];
            parsed.displayRarity = apiCard.rarity || parsed.category;
        } 
        else if (game === 'mtg') {
            parsed.img = apiCard.image_uris ? apiCard.image_uris.normal : (apiCard.card_faces ? apiCard.card_faces[0].image_uris.normal : '');
            parsed.price = apiCard.prices.usd || "0.00";
            
            const t = apiCard.type_line.toLowerCase();
            if (t.includes('creature')) parsed.category = 'Creatures';
            else if (t.includes('land')) parsed.category = 'Lands';
            else if (t.includes('planeswalker')) parsed.category = 'Planeswalkers';
            else if (t.includes('artifact')) parsed.category = 'Artifacts';
            else if (t.includes('enchantment')) parsed.category = 'Enchantments';
            else if (t.includes('instant') || t.includes('sorcery')) parsed.category = 'Instants/Sorceries';

            const colorMap = { 'W': 'White', 'U': 'Blue', 'B': 'Black', 'R': 'Red', 'G': 'Green' };
            parsed.preference = (apiCard.colors && apiCard.colors.length > 0) ? colorMap[apiCard.colors[0]] : 'Colorless';
            
            parsed.rarities = [apiCard.rarity];
            parsed.displayRarity = apiCard.rarity;
        }

        return parsed;
    }

    function renderFiltersUI() {
        const config = filterOptions[activeMarketGame];
        const catContainer = document.getElementById('dynamicCategoryFilters');
        let catHtml = `<h3 class="font-headline font-black text-slate-500 uppercase text-[10px] tracking-widest mb-3">Card Category</h3><div class="space-y-1">`;
        config.categories.forEach(cat => {
            const isActive = activeCategory === cat;
            const bgClass = isActive ? 'bg-[var(--game-color)]/20 text-[var(--game-color)] border-l-4 border-[var(--game-color)] font-bold' : 'text-slate-400 hover:bg-white/5 border-l-4 border-transparent hover:border-slate-500 font-medium';
            catHtml += `<button onclick="setCategory('${cat}')" class="w-full text-left px-4 py-2 text-xs transition-all rounded-r-lg ${bgClass}">${cat}</button>`;
        });
        catHtml += `</div>`;
        catContainer.innerHTML = catHtml;

        document.getElementById('preferenceSelect').innerHTML = config.preferences.map(p => `<option value="${p}">${p}</option>`).join('');
        document.getElementById('raritySelect').innerHTML = config.rarities.map(r => `<option value="${r}">${r}</option>`).join('');
    }

    function resetFilters() {
        activeCategory = 'All';
        document.getElementById('preferenceSelect').selectedIndex = 0;
        document.getElementById('raritySelect').selectedIndex = 0;
        renderFiltersUI();
        applyFilters();
    }

    function setCategory(cat) {
        activeCategory = cat;
        renderFiltersUI();
        applyFilters();
    }

    function setMarketGame(gameId) {
        activeMarketGame = gameId;
        document.getElementById('appBody').className = `bg-background text-on-surface font-body selection:bg-[var(--game-color)] selection:text-background theme-${gameId}`;
        document.getElementById('marketTitle').innerText = `${gameConfig[gameId].name} Market`;
        document.getElementById('dataSourceLabel').innerHTML = `<span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> ${gameConfig[gameId].source}`;

        ['ygo', 'pkmn', 'mtg'].forEach(id => {
            const btn = document.getElementById(`btn-${id}`);
            if (id === gameId) {
                if(gameId === 'ygo') btn.className = "w-full text-left bg-slate-900 text-[#69daff] border-r-4 border-[#69daff] px-4 py-3 flex items-center gap-3 text-sm font-bold transition-all rounded-l-lg shadow-md";
                if(gameId === 'pkmn') btn.className = "w-full text-left bg-yellow-900/20 text-[#ffcb05] border-r-4 border-[#ffcb05] px-4 py-3 flex items-center gap-3 text-sm font-bold transition-all rounded-l-lg shadow-md";
                if(gameId === 'mtg') btn.className = "w-full text-left bg-orange-900/20 text-[#ff7a00] border-r-4 border-[#ff7a00] px-4 py-3 flex items-center gap-3 text-sm font-bold transition-all rounded-l-lg shadow-md";
            } else {
                btn.className = "w-full text-left text-slate-500 hover:bg-white/5 border-r-4 border-transparent px-4 py-3 flex items-center gap-3 text-sm font-medium transition-all rounded-l-lg";
            }
        });

        resetFilters(); 
        
        const inputEl = document.getElementById('searchInput');
        inputEl.value = '';
        inputEl.placeholder = `Live search ${gameConfig[gameId].name} cards...`;
        document.getElementById('searchStatus').innerText = "Global Index Ranking";
        latestFetchedData = [];
        
        document.getElementById('resultsGrid').innerHTML = `
            <div class="col-span-full py-20 flex flex-col items-center justify-center text-slate-500">
                <span class="material-symbols-outlined text-6xl mb-4 opacity-50 text-[var(--game-color)]">manage_search</span>
                <p class="font-headline text-xl">Start typing to fetch live ${gameConfig[gameId].name} market data.</p>
                <p class="text-sm mt-2 opacity-60">Fuzzy search & Multi-dimensional filters active!</p>
            </div>
        `;
    }

    document.getElementById('searchInput').addEventListener('input', (e) => {
        clearTimeout(searchTimeout);
        const query = e.target.value.trim();
        const searchIcon = document.getElementById('searchIcon');

        if (query.length === 0) {
            searchIcon.innerHTML = `<span class="material-symbols-outlined text-sm">search</span>`;
            return;
        }

        searchIcon.innerHTML = `<span class="material-symbols-outlined text-sm animate-spin text-[var(--game-color)]">refresh</span>`;
        searchTimeout = setTimeout(() => { fetchFromAPI(query); }, 600); 
    });

    async function fetchFromAPI(query) {
        const grid = document.getElementById('resultsGrid');
        const searchStatus = document.getElementById('searchStatus');
        const searchIcon = document.getElementById('searchIcon');
        
        searchStatus.innerText = `Hooking live market data for "${query}"...`;

        try {
            latestFetchedData = []; 

            if (activeMarketGame === 'ygo') {
                const res = await fetch(`https://db.ygoprodeck.com/api/v7/cardinfo.php?fname=${encodeURIComponent(query)}`);
                const data = await res.json();
                if(!data.error) latestFetchedData = data.data.slice(0, 100).map(c => parseCardData('ygo', c));
            } 
            else if (activeMarketGame === 'pkmn') {
                const fuzzyQueries = query.split(' ').filter(w => w.length > 0).map(w => `name:*${w}*`).join(' ');
                const res = await fetch(`https://api.pokemontcg.io/v2/cards?q=${encodeURIComponent(fuzzyQueries)}`);
                const data = await res.json();
                if(data.data && data.data.length > 0) latestFetchedData = data.data.slice(0, 100).map(c => parseCardData('pkmn', c));
            }
            else if (activeMarketGame === 'mtg') {
                const res = await fetch(`https://api.scryfall.com/cards/search?q=${encodeURIComponent(query)}`);
                const data = await res.json();
                if(data.data && data.data.length > 0) {
                    latestFetchedData = data.data.slice(0, 100).map(c => parseCardData('mtg', c)).filter(c => c.img !== ''); 
                }
            }

            searchIcon.innerHTML = `<span class="material-symbols-outlined text-sm">search</span>`;
            applyFilters(); 

        } catch (err) {
            searchIcon.innerHTML = `<span class="material-symbols-outlined text-sm text-error">error</span>`;
            searchStatus.innerText = "Connection lost.";
            grid.innerHTML = '<p class="text-error font-headline text-xl col-span-full text-center py-12">Database connection failed. 数据库连接失败。</p>';
        }
    }

    function applyFilters() {
        const grid = document.getElementById('resultsGrid');
        const searchStatus = document.getElementById('searchStatus');
        
        const selPref = document.getElementById('preferenceSelect').value;
        const selRarity = document.getElementById('raritySelect').value;

        const isFiltered = activeCategory !== 'All' || !selPref.includes('All') || !selRarity.includes('All');
        const badge = document.getElementById('activeFiltersBadge');
        if (isFiltered) {
            badge.style.display = 'flex';
            document.getElementById('activeFiltersText').innerText = 'Filters Active';
        } else {
            badge.style.display = 'none';
        }

        if (!latestFetchedData || latestFetchedData.length === 0) {
            const query = document.getElementById('searchInput').value;
            if(query) {
                grid.innerHTML = `
                <div class="col-span-full py-20 flex flex-col items-center justify-center text-error">
                    <span class="material-symbols-outlined text-6xl mb-4 opacity-80">sentiment_dissatisfied</span>
                    <p class="font-headline text-xl">No assets found</p>
                </div>`;
            }
            return;
        }

        let filteredData = latestFetchedData.filter(card => {
            if (activeCategory !== 'All' && card.category !== activeCategory) return false;
            if (!selPref.includes('All') && card.preference !== selPref) return false;
            if (!selRarity.includes('All')) {
                const hasRarity = card.rarities.some(r => r && r.toLowerCase() === selRarity.toLowerCase());
                if (!hasRarity) return false;
            }
            return true;
        });

        const cardsToDisplay = filteredData.slice(0, 16);

        if (cardsToDisplay.length === 0) {
            searchStatus.innerText = "0 results found.";
            grid.innerHTML = `
                <div class="col-span-full py-20 flex flex-col items-center justify-center text-error">
                    <span class="material-symbols-outlined text-6xl mb-4 opacity-80">filter_list_off</span>
                    <p class="font-headline text-xl">No cards match your exact filters</p>
                    <p class="text-sm mt-2 opacity-60 text-slate-400">Try broadening your search criteria.</p>
                </div>`;
            return;
        }

        searchStatus.innerText = `Displaying ${cardsToDisplay.length} filtered results`;
        grid.innerHTML = '';

        cardsToDisplay.forEach(card => {
            const detailLink = `onboard_card_detail_standardized_header.html?game=${activeMarketGame}&id=${card.id}`;
            let displayRarity = selRarity.includes('All') ? card.displayRarity : selRarity; 
            let displayPrice = card.price;
            let priceLabel = "Base Value"; // 清楚标明当前显示的是底价还是特定版本价格

            // 🌟 究极黑科技：游戏王专属特定罕贵度价格挖掘引擎！
            if (activeMarketGame === 'ygo' && !selRarity.includes('All')) {
                // 找出所有符合要求的罕贵度版本
                const matchingSets = card.rawSets.filter(s => s.set_rarity.toLowerCase() === selRarity.toLowerCase());
                
                if (matchingSets.length > 0) {
                    let maxPrice = 0;
                    // 对比出所有版本中最高/最有效的价格
                    matchingSets.forEach(s => {
                        const p = parseFloat(s.set_price || "0");
                        if (p > maxPrice) maxPrice = p;
                    });
                    
                    if (maxPrice > 0) {
                        displayPrice = maxPrice.toFixed(2);
                        priceLabel = "Specific Rarity";
                    } else {
                        // 核心防坑！如果 API 彻底没数据，显示 N/A，绝不用 0.16 忽悠人！
                        displayPrice = "N/A";
                        priceLabel = "Data Missing";
                    }
                }
            }

            const cardHTML = `
                <div class="group relative bg-surface-container-high rounded-xl overflow-hidden transition-all duration-500 hover:-translate-y-2 hover:shadow-[0_20px_40px_-15px_var(--game-color)] border border-transparent hover:border-[var(--game-color)]/30">
                    <div class="aspect-[3/4] overflow-hidden relative bg-black">
                        <img class="absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" src="${card.img}" alt="${card.name}"/>
                        <div class="absolute top-3 left-3 flex gap-2">
                            <span class="bg-black/80 backdrop-blur-md text-white border border-[var(--game-color)]/50 font-label text-[10px] font-black px-2 py-1 rounded uppercase tracking-tighter shadow-lg">${card.preference}</span>
                        </div>
                        <div class="absolute bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-black via-black/80 to-transparent">
                            <div>
                                <p class="font-label text-[10px] text-[var(--game-color)] uppercase tracking-widest mb-1 drop-shadow-md truncate">${displayRarity}</p>
                                <h4 class="font-headline text-lg font-bold text-white leading-tight truncate w-full drop-shadow-lg">${card.name}</h4>
                            </div>
                        </div>
                    </div>
                    <div class="p-5 bg-surface-container-highest relative">
                        <div class="flex justify-between items-center mb-4">
                            <div>
                                <p class="text-[10px] text-slate-400 uppercase font-label tracking-widest">${priceLabel}</p>
                                <p class="font-headline text-2xl font-black ${displayPrice === 'N/A' ? 'text-slate-500' : 'text-white'} mt-1">${displayPrice === 'N/A' ? 'N/A' : '$' + displayPrice}</p>
                            </div>
                            <div class="text-right flex flex-col items-end">
                                <p class="text-[9px] text-[var(--game-color)] uppercase font-label tracking-widest flex items-center gap-1">
                                    <span class="w-1.5 h-1.5 rounded-full bg-[var(--game-color)] animate-ping"></span> LIVE
                                </p>
                                <div class="h-1 w-12 bg-black rounded-full mt-2 overflow-hidden shadow-inner">
                                    <div class="h-full bg-[var(--game-color)] w-full"></div>
                                </div>
                            </div>
                        </div>
                        <a href="${detailLink}" class="w-full py-2.5 bg-background border border-white/5 text-slate-300 text-xs font-bold rounded-lg hover:bg-[var(--game-color)] hover:text-background hover:border-transparent transition-all block text-center shadow-md">
                            View Details
                        </a>
                    </div>
                </div>
            `;
            grid.insertAdjacentHTML('beforeend', cardHTML);
        });
    }

    renderFiltersUI();
</script>
</body>
</html>
