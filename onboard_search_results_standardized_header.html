<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Onboard - Market Search</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&family=Manrope:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container": "#171a1d",
              "surface-container-low": "#111417",
              "surface-container-highest": "#23262a",
              "on-surface": "#f9f9fd",
              "primary": "#69daff",
              "error": "#ff716c",
              "background": "#0c0e11",
              "surface-variant": "#23262a"
            },
            fontFamily: {
              "headline": ["Space Grotesk"],
              "body": ["Manrope"],
              "label": ["Inter"]
            }
          }
        }
      }
</script>
<style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    /* 游戏主题色变量 */
    .theme-ygo { --game-color: #69daff; --game-hover: #004a5d; }
    .theme-pkmn { --game-color: #ffcb05; --game-hover: #4a3a00; }
    .theme-mtg { --game-color: #ff7a00; --game-hover: #4a2300; }

    /* 强制抵抗浏览器自动填充导致的白底白字，锁死深色背景 */
    input:-webkit-autofill,
    input:-webkit-autofill:hover, 
    input:-webkit-autofill:focus, 
    input:-webkit-autofill:active{
        -webkit-box-shadow: 0 0 0 30px #111417 inset !important;
        -webkit-text-fill-color: white !important;
        transition: background-color 5000s ease-in-out 0s;
    }
</style>
</head>
<body id="appBody" class="bg-background text-on-surface font-body selection:bg-[var(--game-color)] selection:text-background theme-ygo">

<header class="bg-[#0c0e11] flex justify-between items-center w-full px-6 py-4 h-20 top-0 z-50 border-b border-[#23262a]/30 shadow-[0_24px_48px_rgba(0,0,0,0.4)] fixed">
    <div class="flex items-center w-1/4">
        <a href="index.html" class="flex items-center gap-3 group cursor-pointer">
            <img alt="Onboard Logo" class="h-10 w-10 object-contain" src="https://lh3.googleusercontent.com/aida/ADBb0uj9tE9aJKEn5prVJMPWSgFkk86I0ROmzEbe9DLWImJa6WmhhTwNiexAOFgaa0qw-nqqXLN0nkYatbrxIlr8Hf_AJ1jP8ty6nkmmKZrbCfcODygZXShyfyNyjEDsqJU1pq484mK5EQn-VH3pukRhsNvEcCsGqvFkeqdzqnqLszir-RaIJGyhQZ8vPB0tMBvjV-9LK9D4wbNOLYsxk5_IUMQkrTobNro4pD_NzWb03P6qX3AcH5Ari1ilEPkn"/>
            <span class="text-4xl font-bold tracking-tight text-[var(--game-color)] font-headline transition-colors">Onboard</span>
        </a>
    </div>
    <nav class="flex-1 flex justify-center items-center gap-12 font-headline font-medium tracking-[0.1em] text-[13px] uppercase">
        <div class="relative flex flex-col items-center">
            <a class="text-[var(--game-color)] font-bold whitespace-nowrap transition-colors" href="onboard_search_results_standardized_header.html">Market</a>
            <div class="absolute -bottom-2 w-full h-1 bg-[var(--game-color)] rounded-full transition-colors"></div>
        </div>
        <a class="text-[#f9f9fd]/50 hover:text-[var(--game-color)] transition-colors whitespace-nowrap" href="onboard_watchlist_standardized_header.html">Watchlist</a>
        <a class="text-[#f9f9fd]/50 hover:text-[var(--game-color)] transition-colors whitespace-nowrap" href="onboard_deck_builder_standardized_header.html">Deck Builder</a>
        <a class="text-[#f9f9fd]/50 hover:text-[var(--game-color)] transition-colors whitespace-nowrap" href="onboard_my_collection_standardized_header.html">Collection</a>
        <a class="text-[#f9f9fd]/50 hover:text-[var(--game-color)] transition-colors whitespace-nowrap" href="onboard_seller_hub_standardized_header.html">Seller Hub</a>
    </nav>
    <div class="flex items-center justify-end gap-4 w-1/4">
        <div class="relative hidden lg:block mr-4">
            <input id="searchInput" spellcheck="false" autocomplete="off" class="bg-[#111417] text-white border border-white/10 focus:outline-none focus:ring-1 focus:ring-[var(--game-color)] focus:border-[var(--game-color)] w-64 rounded-full px-5 py-2 text-sm font-body transition-all placeholder:text-slate-500" placeholder="Live search cards..." type="text"/>
            <div class="absolute right-3 top-2.5 text-slate-400" id="searchIcon">
                <span class="material-symbols-outlined text-sm">search</span>
            </div>
        </div>
        <div class="flex items-center gap-1">
            <button class="p-2 hover:bg-[#171a1d] transition-all duration-200 rounded-full">
                <span class="material-symbols-outlined text-[var(--game-color)] transition-colors">notifications</span>
            </button>
            <div class="w-9 h-9 rounded-full bg-surface-container-highest overflow-hidden ml-2 border border-outline-variant/30">
                <img alt="user avatar" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD1oC1axstDPvxy7g1rpa1_R6WaPvmsh6MRPV0VwxQRnTw8Gu3CAPYaQa5-Abo2LOBz6PMcEITb2LwEQSjnTuAAltject8-5saG4CHFctYnNjlfOh3UjZHrafjYddc6TToIgQoMILhFGG9zd3QNBuOR4BZVPGts3XLzOlWLVtH7fCo7ljv7hH8KFncJ3E519BRvYCOyUv6zZEGUBDclxtioynXYzA48ymxdytXG1DU2Vo0e0y7APgrH1gCQ6Zj__67IsWDQn0XRCEnB"/>
            </div>
        </div>
    </div>
</header>

<div class="flex pt-20 min-h-screen">
    <aside class="fixed left-0 top-0 h-full w-64 bg-[#080a0d] flex flex-col z-40 shadow-[24px_0_48px_rgba(0,0,0,0.4)] pt-24 overflow-y-auto border-r border-white/5">
        <div class="px-6 mb-6">
            <h3 class="font-headline font-black text-[var(--game-color)] uppercase text-xs tracking-widest mb-4 transition-colors">Market Universe</h3>
            <div class="space-y-2">
                <button id="btn-ygo" onclick="setMarketGame('ygo')" class="w-full text-left bg-slate-900 text-[#69daff] border-r-4 border-[#69daff] px-4 py-3 flex items-center gap-3 text-sm font-bold transition-all rounded-l-lg shadow-md">
                    <span class="material-symbols-outlined text-sm">auto_awesome</span> Yu-Gi-Oh!
                </button>
                <button id="btn-pkmn" onclick="setMarketGame('pkmn')" class="w-full text-left text-slate-500 hover:bg-yellow-900/20 hover:text-[#ffcb05] border-r-4 border-transparent px-4 py-3 flex items-center gap-3 text-sm font-medium transition-all rounded-l-lg">
                    <span class="material-symbols-outlined text-sm">bolt</span> Pokémon
                </button>
                <button id="btn-mtg" onclick="setMarketGame('mtg')" class="w-full text-left text-slate-500 hover:bg-orange-900/20 hover:text-[#ff7a00] border-r-4 border-transparent px-4 py-3 flex items-center gap-3 text-sm font-medium transition-all rounded-l-lg">
                    <span class="material-symbols-outlined text-sm">castle</span> Magic: TG
                </button>
            </div>
        </div>

        <div id="dynamicCategoryFilters" class="px-6 mb-8">
            </div>

        <div class="px-6 mt-auto mb-8">
            <div class="bg-surface-container-low p-4 rounded-lg border border-white/5">
                <p class="text-[10px] uppercase font-label text-slate-500 tracking-widest mb-2">Data Source</p>
                <p id="dataSourceLabel" class="text-xs font-bold text-white flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> TCGPlayer API
                </p>
            </div>
        </div>
    </aside>

    <main class="ml-64 flex-1 px-10 py-10 max-w-screen-2xl">
        <header class="mb-10 flex justify-between items-end">
            <div>
                <div class="flex items-center gap-3 mb-2">
                    <span class="font-label uppercase text-[10px] text-[var(--game-color)] tracking-widest bg-[var(--game-color)]/10 px-2 py-1 rounded border border-[var(--game-color)]/20 transition-colors">LIVE MARKET</span>
                    <span id="searchStatus" class="text-slate-400 text-xs font-label uppercase tracking-widest">Global Index Ranking</span>
                </div>
                <h1 id="marketTitle" class="font-headline text-5xl font-black text-white tracking-tighter">Yu-Gi-Oh! Market</h1>
            </div>
            <div id="activeCategoryBadge" class="hidden flex items-center gap-2 bg-surface-container-low px-4 py-2 rounded-full text-xs font-bold border border-outline-variant/10 text-[var(--game-color)]">
                <span class="material-symbols-outlined text-sm">filter_alt</span> <span id="activeCategoryText">All Cards</span>
            </div>
        </header>

        <div id="resultsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            <div class="col-span-full py-20 flex flex-col items-center justify-center text-slate-500">
                <span class="material-symbols-outlined text-6xl mb-4 opacity-50 text-[var(--game-color)]">manage_search</span>
                <p class="font-headline text-xl">Start typing to fetch live Yu-Gi-Oh! market data.</p>
                <p class="text-sm mt-2 opacity-60">Fuzzy search & Category filters active!</p>
            </div>
        </div>
    </main>
</div>

<script>
    // --- 1. 全局数据与配置 ---
    const gameConfig = {
        ygo: { name: "Yu-Gi-Oh!", color: "#69daff", source: "TCGPlayer API" },
        pkmn: { name: "Pokémon", color: "#ffcb05", source: "Pokémon TCG API" },
        mtg: { name: "Magic: TG", color: "#ff7a00", source: "Scryfall API" }
    };

    // 为每个游戏定义专属分类
    const gameCategories = {
        ygo: ['All', 'Monsters', 'Spells', 'Traps'],
        pkmn: ['All', 'Pokémon', 'Trainers', 'Energies'],
        mtg: ['All', 'Creatures', 'Instants & Sorceries', 'Lands', 'Artifacts', 'Enchantments', 'Planeswalkers']
    };

    let activeMarketGame = 'ygo';
    let activeCategory = 'All'; // 默认选中全部
    let searchTimeout = null;

    // --- 2. 智能卡牌识别函数 ---
    function getCardCategory(game, typeLine) {
        if (!typeLine) return 'Other';
        const t = typeLine.toLowerCase();
        
        if (game === 'ygo') {
            if (t.includes('spell')) return 'Spells';
            if (t.includes('trap')) return 'Traps';
            return 'Monsters';
        } 
        else if (game === 'pkmn') {
            if (t.includes('pokémon') || t.includes('pokemon')) return 'Pokémon';
            if (t.includes('trainer')) return 'Trainers';
            if (t.includes('energy')) return 'Energies';
            return 'Other';
        } 
        else if (game === 'mtg') {
            if (t.includes('creature')) return 'Creatures';
            if (t.includes('land')) return 'Lands';
            if (t.includes('planeswalker')) return 'Planeswalkers';
            if (t.includes('artifact')) return 'Artifacts';
            if (t.includes('enchantment')) return 'Enchantments';
            if (t.includes('instant') || t.includes('sorcery')) return 'Instants & Sorceries';
            return 'Other';
        }
        return 'Cards';
    }

    // --- 3. 侧边栏动态过滤菜单渲染 ---
    function renderCategoryFilters() {
        const container = document.getElementById('dynamicCategoryFilters');
        const cats = gameCategories[activeMarketGame];
        
        let html = `<h3 class="font-headline font-black text-slate-500 uppercase text-[10px] tracking-widest mb-3">Filter by Category</h3><div class="space-y-1">`;
        
        cats.forEach(cat => {
            const isActive = activeCategory === cat;
            const bgClass = isActive 
                ? 'bg-[var(--game-color)]/20 text-[var(--game-color)] border-l-4 border-[var(--game-color)] font-bold' 
                : 'text-slate-400 hover:bg-white/5 border-l-4 border-transparent hover:border-slate-500 font-medium';
            
            html += `<button onclick="setCategory('${cat}')" class="w-full text-left px-4 py-2 text-xs transition-all rounded-r-lg ${bgClass}">${cat}</button>`;
        });
        html += `</div>`;
        container.innerHTML = html;

        // 更新大标题旁边的徽章
        const badge = document.getElementById('activeCategoryBadge');
        if (activeCategory !== 'All') {
            badge.style.display = 'flex';
            document.getElementById('activeCategoryText').innerText = activeCategory;
        } else {
            badge.style.display = 'none';
        }
    }

    // 点击分类时触发
    function setCategory(cat) {
        activeCategory = cat;
        renderCategoryFilters();
        
        // 重新触发搜索以应用新的过滤规则
        const query = document.getElementById('searchInput').value.trim();
        if (query) {
            triggerSearch(query);
        }
    }

    // --- 4. 侧边栏游戏切换逻辑 ---
    function setMarketGame(gameId) {
        activeMarketGame = gameId;
        activeCategory = 'All'; // 切换游戏时重置分类
        
        document.getElementById('appBody').className = `bg-background text-on-surface font-body selection:bg-[var(--game-color)] selection:text-background theme-${gameId}`;
        document.getElementById('marketTitle').innerText = `${gameConfig[gameId].name} Market`;
        document.getElementById('dataSourceLabel').innerHTML = `<span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> ${gameConfig[gameId].source}`;

        ['ygo', 'pkmn', 'mtg'].forEach(id => {
            const btn = document.getElementById(`btn-${id}`);
            if (id === gameId) {
                if(gameId === 'ygo') btn.className = "w-full text-left bg-slate-900 text-[#69daff] border-r-4 border-[#69daff] px-4 py-3 flex items-center gap-3 text-sm font-bold transition-all rounded-l-lg shadow-md";
                if(gameId === 'pkmn') btn.className = "w-full text-left bg-yellow-900/20 text-[#ffcb05] border-r-4 border-[#ffcb05] px-4 py-3 flex items-center gap-3 text-sm font-bold transition-all rounded-l-lg shadow-md";
                if(gameId === 'mtg') btn.className = "w-full text-left bg-orange-900/20 text-[#ff7a00] border-r-4 border-[#ff7a00] px-4 py-3 flex items-center gap-3 text-sm font-bold transition-all rounded-l-lg shadow-md";
            } else {
                btn.className = "w-full text-left text-slate-500 hover:bg-white/5 border-r-4 border-transparent px-4 py-3 flex items-center gap-3 text-sm font-medium transition-all rounded-l-lg";
            }
        });

        renderCategoryFilters(); // 刷新分类菜单

        const inputEl = document.getElementById('searchInput');
        inputEl.value = '';
        inputEl.placeholder = `Live search ${gameConfig[gameId].name} cards...`;
        document.getElementById('searchStatus').innerText = "Global Index Ranking";
        
        document.getElementById('resultsGrid').innerHTML = `
            <div class="col-span-full py-20 flex flex-col items-center justify-center text-slate-500">
                <span class="material-symbols-outlined text-6xl mb-4 opacity-50 text-[var(--game-color)]">manage_search</span>
                <p class="font-headline text-xl">Start typing to fetch live ${gameConfig[gameId].name} market data.</p>
                <p class="text-sm mt-2 opacity-60">Fuzzy search & Category filters active!</p>
            </div>
        `;
    }

    // --- 5. 模糊搜索绑定 ---
    document.getElementById('searchInput').addEventListener('input', (e) => {
        clearTimeout(searchTimeout);
        const query = e.target.value.trim();
        const searchIcon = document.getElementById('searchIcon');

        if (query.length === 0) {
            searchIcon.innerHTML = `<span class="material-symbols-outlined text-sm">search</span>`;
            return;
        }

        searchIcon.innerHTML = `<span class="material-symbols-outlined text-sm animate-spin text-[var(--game-color)]">refresh</span>`;
        
        searchTimeout = setTimeout(() => {
            triggerSearch(query);
        }, 500); 
    });

    // --- 6. API 拉取与智能过滤 ---
    async function triggerSearch(query) {
        const grid = document.getElementById('resultsGrid');
        const searchStatus = document.getElementById('searchStatus');
        const searchIcon = document.getElementById('searchIcon');
        
        searchStatus.innerText = `Hooking live market data for "${query}"...`;

        try {
            let allFetchedCards = [];

            if (activeMarketGame === 'ygo') {
                const res = await fetch(`https://db.ygoprodeck.com/api/v7/cardinfo.php?fname=${encodeURIComponent(query)}`);
                const data = await res.json();
                if(!data.error) {
                    // 一次性多抓取一些用于过滤（最多60张）
                    allFetchedCards = data.data.slice(0, 60).map(c => ({
                        id: c.id, 
                        name: c.name, 
                        img: c.card_images[0].image_url, 
                        rarity: c.type.includes("Monster") ? "Monster Card" : "Spell/Trap",
                        rawType: c.type, // 用于分类器
                        price: c.card_prices[0]?.tcgplayer_price || "0.00"
                    }));
                }
            } 
            else if (activeMarketGame === 'pkmn') {
                const fuzzyQueries = query.split(' ').filter(w => w.length > 0).map(w => `name:*${w}*`).join(' ');
                const res = await fetch(`https://api.pokemontcg.io/v2/cards?q=${encodeURIComponent(fuzzyQueries)}`);
                const data = await res.json();
                if(data.data && data.data.length > 0) {
                    allFetchedCards = data.data.slice(0, 60).map(c => ({
                        id: c.id, 
                        name: c.name, 
                        img: c.images.large || c.images.small, 
                        rarity: c.rarity || c.supertype,
                        rawType: c.supertype, // 用于分类器
                        price: c.tcgplayer?.prices?.holofoil?.market || c.tcgplayer?.prices?.normal?.market || "0.00"
                    }));
                }
            }
            else if (activeMarketGame === 'mtg') {
                const res = await fetch(`https://api.scryfall.com/cards/search?q=${encodeURIComponent(query)}`);
                const data = await res.json();
                if(data.data && data.data.length > 0) {
                    allFetchedCards = data.data.slice(0, 60).map(c => ({
                        id: c.id, 
                        name: c.name, 
                        img: c.image_uris ? c.image_uris.normal : (c.card_faces ? c.card_faces[0].image_uris.normal : ''), 
                        rarity: c.rarity,
                        rawType: c.type_line, // 用于分类器
                        price: c.prices.usd || "0.00"
                    })).filter(c => c.img !== ''); 
                }
            }

            // 🌟 核心过滤引擎：应用用户在侧边栏选择的分类 🌟
            if (activeCategory !== 'All') {
                allFetchedCards = allFetchedCards.filter(card => getCardCategory(activeMarketGame, card.rawType) === activeCategory);
            }

            // 截取过滤后的前 16 张展示
            const cardsToDisplay = allFetchedCards.slice(0, 16);

            // --- 渲染结果 ---
            searchIcon.innerHTML = `<span class="material-symbols-outlined text-sm">search</span>`;

            if (cardsToDisplay.length === 0) {
                let errorMsg = `No assets found for "${query}"`;
                if (activeCategory !== 'All') errorMsg += ` in category [${activeCategory}]`;
                
                searchStatus.innerText = "0 results found.";
                grid.innerHTML = `
                    <div class="col-span-full py-20 flex flex-col items-center justify-center text-error">
                        <span class="material-symbols-outlined text-6xl mb-4 opacity-80">sentiment_dissatisfied</span>
                        <p class="font-headline text-xl">${errorMsg}</p>
                        <p class="text-sm mt-2 opacity-60 text-slate-400">Try changing the category filter or check spelling.</p>
                    </div>`;
                return;
            }

            searchStatus.innerText = `Displaying top ${cardsToDisplay.length} market results`;
            grid.innerHTML = '';

            cardsToDisplay.forEach(card => {
                const cardHTML = `
                    <div class="group relative bg-surface-container-high rounded-xl overflow-hidden transition-all duration-500 hover:-translate-y-2 hover:shadow-[0_20px_40px_-15px_var(--game-color)] border border-transparent hover:border-[var(--game-color)]/30">
                        <div class="aspect-[3/4] overflow-hidden relative bg-black">
                            <img class="absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" src="${card.img}" alt="${card.name}"/>
                            <div class="absolute top-3 left-3 flex gap-2">
                                <span class="bg-black/80 backdrop-blur-md text-white border border-[var(--game-color)]/50 font-label text-[10px] font-black px-2 py-1 rounded uppercase tracking-tighter shadow-lg">EN</span>
                            </div>
                            <div class="absolute bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-black via-black/80 to-transparent">
                                <div>
                                    <p class="font-label text-[10px] text-[var(--game-color)] uppercase tracking-widest mb-1 drop-shadow-md">${card.rarity}</p>
                                    <h4 class="font-headline text-lg font-bold text-white leading-tight truncate w-full drop-shadow-lg">${card.name}</h4>
                                </div>
                            </div>
                        </div>
                        <div class="p-5 bg-surface-container-highest relative">
                            <div class="flex justify-between items-center mb-4">
                                <div>
                                    <p class="text-[10px] text-slate-400 uppercase font-label tracking-widest">Market Value</p>
                                    <p class="font-headline text-2xl font-black text-white mt-1">$${card.price}</p>
                                </div>
                                <div class="text-right flex flex-col items-end">
                                    <p class="text-[9px] text-[var(--game-color)] uppercase font-label tracking-widest flex items-center gap-1">
                                        <span class="w-1.5 h-1.5 rounded-full bg-[var(--game-color)] animate-ping"></span> LIVE
                                    </p>
                                    <div class="h-1 w-12 bg-black rounded-full mt-2 overflow-hidden shadow-inner">
                                        <div class="h-full bg-[var(--game-color)] w-full"></div>
                                    </div>
                                </div>
                            </div>
                            <a href="onboard_card_detail_standardized_header.html" class="w-full py-2.5 bg-background border border-white/5 text-slate-300 text-xs font-bold rounded-lg hover:bg-[var(--game-color)] hover:text-background hover:border-transparent transition-all block text-center shadow-md">
                                View Details
                            </a>
                        </div>
                    </div>
                `;
                grid.insertAdjacentHTML('beforeend', cardHTML);
            });

        } catch (err) {
            searchIcon.innerHTML = `<span class="material-symbols-outlined text-sm text-error">error</span>`;
            searchStatus.innerText = "Connection lost.";
            grid.innerHTML = '<p class="text-error font-headline text-xl col-span-full text-center py-12">Database connection failed. 数据库连接失败。</p>';
        }
    }

    // 初始化渲染侧边栏分类
    renderCategoryFilters();

</script>
</body>
</html>
