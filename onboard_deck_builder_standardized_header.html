<main class="flex h-screen pt-20 flex-col">
    <div class="w-full bg-surface-container-lowest border-b border-surface-variant flex justify-center py-2 gap-4">
        <button onclick="switchGame('ygo')" id="tab-ygo" class="px-6 py-2 rounded-full font-headline font-bold text-sm bg-[var(--game-bg)] border border-[var(--game-color)] text-[var(--game-color)] transition-all">Yu-Gi-Oh!</button>
        <button onclick="switchGame('pkmn')" id="tab-pkmn" class="px-6 py-2 rounded-full font-headline font-bold text-sm text-slate-500 hover:text-white transition-all border border-transparent">Pokémon</button>
        <button onclick="switchGame('mtg')" id="tab-mtg" class="px-6 py-2 rounded-full font-headline font-bold text-sm text-slate-500 hover:text-white transition-all border border-transparent">Magic: The Gathering</button>
    </div>

    <div class="flex flex-1 overflow-hidden">
        <div class="flex-1 border-r border-surface-variant/50 p-6 overflow-y-auto no-scrollbar flex flex-col gap-6 bg-surface-container-low/30">
            <div class="flex justify-between items-end mb-2">
                <div>
                    <h1 class="text-3xl font-black font-headline tracking-tight text-[var(--game-color)]">Current Deck</h1>
                    <p class="text-xs font-label uppercase tracking-widest mt-1 text-[var(--game-color)]" id="systemMessage">System Ready.</p>
                </div>
                <div class="flex gap-4">
                    <button onclick="clearDeck()" class="px-4 py-2 border border-error/50 text-error hover:bg-error/10 rounded-lg text-xs font-bold transition-all">Clear All</button>
                    <button class="px-6 py-2 bg-[var(--game-color)] text-[#0c0e11] rounded-lg text-xs font-bold hover:brightness-110 shadow-[0_0_15px_var(--game-bg)] transition-all">Save Deck</button>
                </div>
            </div>

            <div class="bg-surface-container-lowest border border-surface-variant rounded-xl p-4 min-h-[300px]">
                <div class="flex justify-between items-center border-b border-surface-variant pb-2 mb-4">
                    <h2 class="font-headline font-bold text-lg">Main Deck</h2>
                    <span id="mainDeckCount" class="font-label text-xs font-black bg-surface-variant px-2 py-1 rounded text-[var(--game-color)]">0 / 60</span>
                </div>
                <div id="mainDeckGrid" class="flex flex-col gap-6"></div>
            </div>

            <div id="extraDeckContainer" class="bg-surface-container-lowest border border-surface-variant rounded-xl p-4 min-h-[150px]">
                <div class="flex justify-between items-center border-b border-surface-variant pb-2 mb-4">
                    <h2 id="extraDeckTitle" class="font-headline font-bold text-lg text-purple-400">Extra Deck</h2>
                    <span id="extraDeckCount" class="font-label text-xs font-black bg-surface-variant px-2 py-1 rounded text-purple-400">0 / 15</span>
                </div>
                <div id="extraDeckGrid" class="flex flex-col gap-6"></div>
            </div>
        </div>

        <div class="w-96 bg-surface-container-highest border-l border-surface-variant/50 flex flex-col h-full relative z-10 shadow-2xl">
            <div class="p-6 border-b border-surface-variant/50 bg-[#0c0e11]">
                <h3 class="font-headline font-bold text-[var(--game-color)] mb-4 flex items-center gap-2">
                    <span class="material-symbols-outlined text-sm">database</span> Card Database
                </h3>
                <div class="relative">
                    <input id="builderSearchInput" type="text" placeholder="Search card to add (Enter)..." class="w-full bg-[#171a1d] border border-surface-variant rounded-lg pl-10 pr-4 py-3 text-sm focus:ring-1 focus:ring-[var(--game-color)] transition-all">
                    <span class="material-symbols-outlined absolute left-3 top-3.5 text-on-surface/50 text-sm">search</span>
                </div>
            </div>

            <div id="builderSearchResults" class="flex-1 overflow-y-auto p-4 space-y-3 no-scrollbar pb-24">
                <p class="text-center text-xs text-on-surface/40 mt-10">Search for a card to begin building.</p>
            </div>
        </div>
    </div>
</main>

<script>
    // ---------------------------------------------------
    // 1. 数据结构与状态管理
    // ---------------------------------------------------
    const gameRules = {
        ygo: {
            name: "Yu-Gi-Oh!",
            color: "#69daff",
            maxCopies: 3,
            mainMin: 40,
            mainMax: 60,
            hasExtra: true,
            extraName: "Extra Deck",
            extraMax: 15
        },
        pkmn: {
            name: "Pokémon",
            color: "#ffcb05",
            maxCopies: 4,
            mainMin: 60,
            mainMax: 60,
            hasExtra: false,
            extraName: "",
            extraMax: 0
        },
        mtg: {
            name: "Magic: The Gathering",
            color: "#ff7a00",
            maxCopies: 4,
            mainMin: 60,
            mainMax: 100, 
            hasExtra: true,
            extraName: "Sideboard",
            extraMax: 15
        }
    };

    let activeGame = 'ygo';
    let decks = {
        ygo: { main: [], extra: [] },
        pkmn: { main: [], extra: [] },
        mtg: { main: [], extra: [] }
    };

    const appBody = document.getElementById('appBody');
    const searchInput = document.getElementById('builderSearchInput');
    const searchResults = document.getElementById('builderSearchResults');
    const systemMessage = document.getElementById('systemMessage');
    const extraDeckContainer = document.getElementById('extraDeckContainer');
    const extraDeckTitle = document.getElementById('extraDeckTitle');
    
    // ---------------------------------------------------
    // 智能分类识别函数 (核心改动)
    // ---------------------------------------------------
    function getCardCategory(game, typeLine) {
        if (!typeLine) return 'Other';
        const t = typeLine.toLowerCase();
        
        if (game === 'ygo') {
            if (t.includes('spell')) return 'Spells';
            if (t.includes('trap')) return 'Traps';
            return 'Monsters';
        } 
        else if (game === 'pkmn') {
            if (t.includes('pokémon') || t.includes('pokemon')) return 'Pokémon';
            if (t.includes('trainer')) return 'Trainers';
            if (t.includes('energy')) return 'Energies';
            return 'Other';
        } 
        else if (game === 'mtg') {
            if (t.includes('creature')) return 'Creatures';
            if (t.includes('land')) return 'Lands';
            if (t.includes('planeswalker')) return 'Planeswalkers';
            if (t.includes('artifact')) return 'Artifacts';
            if (t.includes('enchantment')) return 'Enchantments';
            if (t.includes('instant') || t.includes('sorcery')) return 'Instants & Sorceries';
            return 'Other';
        }
        return 'Cards';
    }

    // ---------------------------------------------------
    // 2. 游戏环境切换逻辑
    // ---------------------------------------------------
    function switchGame(gameId) {
        activeGame = gameId;
        appBody.className = `bg-background text-on-surface font-body selection:bg-primary selection:text-[#004a5d] overflow-hidden theme-${gameId}`;
        
        ['ygo', 'pkmn', 'mtg'].forEach(id => {
            const tab = document.getElementById(`tab-${id}`);
            if (id === gameId) {
                tab.className = `px-6 py-2 rounded-full font-headline font-bold text-sm bg-[var(--game-bg)] border border-[var(--game-color)] text-[var(--game-color)] transition-all`;
            } else {
                tab.className = `px-6 py-2 rounded-full font-headline font-bold text-sm text-slate-500 hover:text-white transition-all border border-transparent`;
            }
        });

        const rules = gameRules[gameId];
        if (rules.hasExtra) {
            extraDeckContainer.style.display = 'block';
            extraDeckTitle.innerText = rules.extraName;
        } else {
            extraDeckContainer.style.display = 'none';
        }

        searchInput.value = '';
        searchResults.innerHTML = '<p class="text-center text-xs text-on-surface/40 mt-10">Search for a card in ' + rules.name + '</p>';
        showMessage(`${rules.name} format selected.`);
        renderDeck();
    }

    // ---------------------------------------------------
    // 3. 搜索与 API 调用
    // ---------------------------------------------------
    searchInput.addEventListener('keypress', async function (e) {
        if (e.key === 'Enter') {
            const query = searchInput.value.trim();
            if (!query) return;

            searchResults.innerHTML = '<p class="text-center text-xs mt-10 animate-pulse text-[var(--game-color)]">Fetching from ' + activeGame.toUpperCase() + ' database...</p>';

            try {
                let cardsToDisplay = [];

                if (activeGame === 'ygo') {
                    const res = await fetch(`https://db.ygoprodeck.com/api/v7/cardinfo.php?fname=${encodeURIComponent(query)}`);
                    const data = await res.json();
                    if(!data.error) {
                        cardsToDisplay = data.data.slice(0, 20).map(c => ({
                            id: c.id,
                            name: c.name,
                            img: c.card_images[0].image_url_small,
                            type: c.type, 
                            desc: c.race
                        }));
                    }
                } 
                else if (activeGame === 'pkmn') {
                    const res = await fetch(`https://api.pokemontcg.io/v2/cards?q=name:*${encodeURIComponent(query)}*`);
                    const data = await res.json();
                    if(data.data && data.data.length > 0) {
                        cardsToDisplay = data.data.slice(0, 20).map(c => ({
                            id: c.id,
                            name: c.name,
                            img: c.images.small,
                            type: c.supertype, 
                            desc: c.subtypes ? c.subtypes.join(', ') : ''
                        }));
                    }
                }
                else if (activeGame === 'mtg') {
                    const res = await fetch(`https://api.scryfall.com/cards/search?q=${encodeURIComponent(query)}`);
                    const data = await res.json();
                    if(data.data && data.data.length > 0) {
                        cardsToDisplay = data.data.slice(0, 20).map(c => ({
                            id: c.id,
                            name: c.name,
                            img: c.image_uris ? c.image_uris.small : (c.card_faces ? c.card_faces[0].image_uris.small : ''),
                            type: c.type_line, 
                            desc: c.set_name
                        })).filter(c => c.img !== ''); 
                    }
                }

                if (cardsToDisplay.length === 0) {
                    searchResults.innerHTML = '<p class="text-center text-xs text-error mt-10">Card not found in this game.</p>';
                    return;
                }

                searchResults.innerHTML = '';
                
                cardsToDisplay.forEach(card => {
                    const cardRow = document.createElement('div');
                    cardRow.className = "flex gap-3 bg-[#111417] p-2 rounded-lg border border-transparent hover:border-[var(--game-color)] cursor-pointer transition-all hover:bg-[#171a1d]";
                    cardRow.innerHTML = `
                        <img src="${card.img}" alt="${card.name}" class="w-12 rounded shadow-md object-cover">
                        <div class="flex-1 py-1 flex flex-col justify-between overflow-hidden">
                            <h4 class="font-headline font-bold text-sm text-white truncate">${card.name}</h4>
                            <p class="font-label text-[10px] text-slate-400 truncate">${card.type}</p>
                        </div>
                        <div class="flex flex-col justify-center pr-2 gap-2">
                            <span class="material-symbols-outlined text-[var(--game-color)] hover:scale-125 transition-transform" title="Add to Main Deck" onclick="addCard(event, ${JSON.stringify(card).replace(/"/g, '"')}, false)">add_circle</span>
                            ${gameRules[activeGame].hasExtra ? `<span class="material-symbols-outlined text-purple-400 hover:scale-125 transition-transform text-xs" title="Add to ${gameRules[activeGame].extraName}" onclick="addCard(event, ${JSON.stringify(card).replace(/"/g, '"')}, true)">library_add</span>` : ''}
                        </div>
                    `;
                    searchResults.appendChild(cardRow);
                });

            } catch (err) {
                searchResults.innerHTML = '<p class="text-center text-xs text-error mt-10">API Error / Timeout.</p>';
            }
        }
    });

    // ---------------------------------------------------
    // 4. 卡牌规则检验与添加
    // ---------------------------------------------------
    function showMessage(msg, isError = false) {
        systemMessage.innerText = msg;
        systemMessage.className = `text-xs font-label uppercase tracking-widest mt-1 ${isError ? 'text-error animate-pulse' : 'text-[var(--game-color)]'}`;
        setTimeout(() => {
            systemMessage.innerText = "System Ready.";
            systemMessage.className = "text-xs font-label uppercase tracking-widest mt-1 text-[var(--game-color)] opacity-70";
        }, 3000);
    }

    function isCardUnlimited(card) {
        if (activeGame === 'pkmn') {
            return card.type === 'Energy' && card.desc.includes('Basic');
        } else if (activeGame === 'mtg') {
            return card.type.includes('Basic Land');
        }
        return false;
    }

    function addCard(event, card, forceExtra) {
        event.stopPropagation(); 
        
        const rules = gameRules[activeGame];
        const currentDeck = decks[activeGame];
        
        let isExtra = forceExtra;
        if (activeGame === 'ygo' && !forceExtra) {
            if (card.type.includes('Fusion') || card.type.includes('Synchro') || card.type.includes('XYZ') || card.type.includes('Link')) {
                isExtra = true;
            }
        }

        const targetArray = isExtra ? currentDeck.extra : currentDeck.main;

        if (!isCardUnlimited(card)) {
            const countInMain = currentDeck.main.filter(c => c.name === card.name).length;
            const countInExtra = currentDeck.extra.filter(c => c.name === card.name).length;
            if (countInMain + countInExtra >= rules.maxCopies) {
                showMessage(`Rule Violation: Max ${rules.maxCopies} copies of "${card.name}".`, true);
                return;
            }
        }

        if (isExtra) {
            if (targetArray.length >= rules.extraMax) {
                showMessage(`Rule Violation: ${rules.extraName} limit reached (${rules.extraMax}).`, true);
                return;
            }
        } else {
            if (targetArray.length >= rules.mainMax) {
                showMessage(`Rule Violation: Main Deck limit reached (${rules.mainMax}).`, true);
                return;
            }
        }

        targetArray.push(card);
        targetArray.sort((a, b) => a.name.localeCompare(b.name));
        
        showMessage(`Added ${card.name}.`);
        renderDeck();
    }

    function removeCard(index, isExtra) {
        if (isExtra) decks[activeGame].extra.splice(index, 1);
        else decks[activeGame].main.splice(index, 1);
        renderDeck();
    }

    function clearDeck() {
        if(confirm(`Clear the entire ${gameRules[activeGame].name} deck?`)) {
            decks[activeGame].main = [];
            decks[activeGame].extra = [];
            renderDeck();
        }
    }

    // ---------------------------------------------------
    // 5. 分类渲染 UI (核心改动)
    // ---------------------------------------------------
    function renderDeckGroup(deckArray, containerElement, isExtra) {
        containerElement.innerHTML = '';
        
        if (deckArray.length === 0) return;

        // 1. 按种类分组卡牌
        const grouped = {};
        deckArray.forEach((card, index) => {
            // Extra Deck 强制统一分类，或者保持原类型（这里选择保留卡牌原始类型，比如 Fusion/Synchro）
            let category = isExtra && activeGame === 'ygo' ? card.type : getCardCategory(activeGame, card.type);
            if (!grouped[category]) grouped[category] = [];
            grouped[category].push({ card, index }); // 记录原始 index 用于删除
        });

        // 2. 渲染每个分组
        for (const [category, items] of Object.entries(grouped)) {
            const groupDiv = document.createElement('div');
            groupDiv.className = "w-full";
            
            // 分类标题与分割线
            groupDiv.innerHTML = `
                <div class="flex justify-between items-end border-b border-surface-variant/50 pb-1 mb-3">
                    <h3 class="text-[11px] font-bold uppercase tracking-widest text-slate-400">${category}</h3>
                    <span class="text-[10px] font-label text-slate-500 bg-surface-variant/50 px-2 py-0.5 rounded">${items.length}</span>
                </div>
                <div class="grid grid-cols-8 lg:grid-cols-10 xl:grid-cols-12 gap-2"></div>
            `;
            
            const gridEl = groupDiv.querySelector('.grid');
            
            // 渲染该分类下的卡片
            items.forEach(item => {
                const img = document.createElement('img');
                img.src = item.card.img;
                img.className = "w-full aspect-[3/4] object-cover rounded shadow-md card-hover border border-transparent hover:border-error/80 transition-all";
                img.title = `${item.card.name} (Click to remove)`;
                img.onclick = () => removeCard(item.index, isExtra);
                gridEl.appendChild(img);
            });
            
            containerElement.appendChild(groupDiv);
        }
    }

    function renderDeck() {
        const rules = gameRules[activeGame];
        const currentDeck = decks[activeGame];
        
        const mainCountEl = document.getElementById('mainDeckCount');
        const extraCountEl = document.getElementById('extraDeckCount');
        const mainGrid = document.getElementById('mainDeckGrid');
        const extraGrid = document.getElementById('extraDeckGrid');

        // 更新数量与颜色警告
        mainCountEl.innerText = `${currentDeck.main.length} / ${rules.mainMax}`;
        if (currentDeck.main.length < rules.mainMin) {
            mainCountEl.className = `font-label text-xs font-black px-2 py-1 rounded bg-error/20 text-error`;
        } else {
            mainCountEl.className = `font-label text-xs font-black px-2 py-1 rounded bg-[var(--game-bg)] text-[var(--game-color)]`;
        }

        extraCountEl.innerText = `${currentDeck.extra.length} / ${rules.extraMax}`;

        // 使用新的分类渲染函数
        renderDeckGroup(currentDeck.main, mainGrid, false);
        renderDeckGroup(currentDeck.extra, extraGrid, true);
    }

    // 初始化
    renderDeck();
</script>
</body>
</html>
