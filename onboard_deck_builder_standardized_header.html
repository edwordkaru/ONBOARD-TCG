    <div class="flex flex-1 overflow-hidden">

                    <span class="material-symbols-outlined">database</span> Card Database
                </h3>

                    <input id="builderSearchInput" type="text" placeholder="Search card to add (Enter)..." class="w-full bg-[#171a1d] border border-surface-variant rounded-lg pl-10 pr-4 py-3 text-sm focus:ring-1 focus:ring-[var(--game-color)] transition-all">
                    <span class="material-symbols-outlined absolute left-3 top-3.5 text-on-surface/50 text-sm">search</span>

<script>
    // --- 1. 核心数据与规则 ---
    const gameRules = {
        ygo: { name: "Yu-Gi-Oh!", color: "#69daff", maxCopies: 3, mainMin: 40, mainMax: 60, hasExtra: true, extraName: "Extra Deck", extraMax: 15 },
        pkmn: { name: "Pokémon", color: "#ffcb05", maxCopies: 4, mainMin: 60, mainMax: 60, hasExtra: false, extraName: "", extraMax: 0 },
        mtg: { name: "Magic: The Gathering", color: "#ff7a00", maxCopies: 4, mainMin: 60, mainMax: 100, hasExtra: true, extraName: "Sideboard", extraMax: 15 }
    };

    let activeGame = 'ygo';
    let decks = {
        ygo: { main: [], extra: [] },
        pkmn: { main: [], extra: [] },
        mtg: { main: [], extra: [] }
    };

    // --- 2. 智能分类系统 ---
    function getCardCategory(game, typeLine) {
        if (!typeLine) return 'Other';
        const t = typeLine.toLowerCase();
        
        if (game === 'ygo') {
            if (t.includes('spell')) return 'Spells';
            if (t.includes('trap')) return 'Traps';
            return 'Monsters';
        } 
        else if (game === 'pkmn') {
            if (t.includes('pokémon') || t.includes('pokemon')) return 'Pokémon';
            if (t.includes('trainer')) return 'Trainers';
            if (t.includes('energy')) return 'Energies';
            return 'Other';
        } 
        else if (game === 'mtg') {
            if (t.includes('creature')) return 'Creatures';
            if (t.includes('land')) return 'Lands';
            if (t.includes('planeswalker')) return 'Planeswalkers';
            if (t.includes('artifact')) return 'Artifacts';
            if (t.includes('enchantment')) return 'Enchantments';
            if (t.includes('instant') || t.includes('sorcery')) return 'Instants & Sorceries';
            return 'Other';
        }
        return 'Cards';
    }

    // --- 3. UI 切换与状态 ---
    function switchGame(gameId) {
        activeGame = gameId;
        document.getElementById('appBody').className = `bg-background text-on-surface font-body selection:bg-primary selection:text-[#004a5d] overflow-hidden theme-${gameId}`;
        
        ['ygo', 'pkmn', 'mtg'].forEach(id => {
            const tab = document.getElementById(`tab-${id}`);
            if (id === gameId) {
                tab.className = `px-8 py-2 rounded-full font-headline font-bold text-sm bg-[var(--game-bg)] border border-[var(--game-color)] text-[var(--game-color)] transition-all`;
            } else {
                tab.className = `px-8 py-2 rounded-full font-headline font-bold text-sm text-slate-500 hover:text-white transition-all border border-transparent`;
            }
        });

        const rules = gameRules[gameId];
        const extraContainer = document.getElementById('extraDeckContainer');
        if (rules.hasExtra) {
            extraContainer.style.display = 'block';
            document.getElementById('extraDeckTitle').innerText = rules.extraName;
        } else {
            extraContainer.style.display = 'none';
        }

        document.getElementById('builderSearchInput').value = '';
        document.getElementById('builderSearchResults').innerHTML = `<p class="text-center text-xs text-on-surface/40 mt-10 font-label tracking-widest uppercase">Search ${rules.name}</p>`;
        showMessage(`${rules.name} format loaded.`);
        renderDeck();
    }

    // --- 4. 搜索与添加 ---
    document.getElementById('builderSearchInput').addEventListener('keypress', async function (e) {
        if (e.key === 'Enter') {
            const query = this.value.trim();
            if (!query) return;

            const resultsContainer = document.getElementById('builderSearchResults');
            resultsContainer.innerHTML = '<p class="text-center text-xs mt-10 animate-pulse text-[var(--game-color)]">Hooking API Database...</p>';

            try {
                let cardsToDisplay = [];
                if (activeGame === 'ygo') {
                    const res = await fetch(`https://db.ygoprodeck.com/api/v7/cardinfo.php?fname=${encodeURIComponent(query)}`);
                    const data = await res.json();
                    if(!data.error) {
                        cardsToDisplay = data.data.slice(0, 20).map(c => ({
                            id: c.id, name: c.name, img: c.card_images[0].image_url_small, type: c.type, desc: c.race
                        }));
                    }
                } 
                else if (activeGame === 'pkmn') {
                    const res = await fetch(`https://api.pokemontcg.io/v2/cards?q=name:*${encodeURIComponent(query)}*`);
                    const data = await res.json();
                    if(data.data && data.data.length > 0) {
                        cardsToDisplay = data.data.slice(0, 20).map(c => ({
                            id: c.id, name: c.name, img: c.images.small, type: c.supertype, desc: c.subtypes ? c.subtypes.join(', ') : ''
                        }));
                    }
                }
                else if (activeGame === 'mtg') {
                    const res = await fetch(`https://api.scryfall.com/cards/search?q=${encodeURIComponent(query)}`);
                    const data = await res.json();
                    if(data.data && data.data.length > 0) {
                        cardsToDisplay = data.data.slice(0, 20).map(c => ({
                            id: c.id, name: c.name, img: c.image_uris ? c.image_uris.small : (c.card_faces ? c.card_faces[0].image_uris.small : ''), type: c.type_line, desc: c.set_name
                        })).filter(c => c.img !== ''); 
                    }
                }

                if (cardsToDisplay.length === 0) throw new Error("No cards");
                resultsContainer.innerHTML = '';
                
                cardsToDisplay.forEach(card => {
                    const row = document.createElement('div');
                    row.className = "flex gap-3 bg-[#111417] p-2 rounded-lg border border-transparent hover:border-[var(--game-color)] cursor-pointer transition-all hover:bg-[#171a1d]";
                    row.innerHTML = `
                        <img src="${card.img}" class="w-12 rounded shadow-md object-cover">
                        <div class="flex-1 py-1 flex flex-col justify-between overflow-hidden">
                            <h4 class="font-headline font-bold text-sm text-white truncate">${card.name}</h4>
                            <p class="font-label text-[10px] text-slate-400 truncate">${card.type}</p>
                        </div>
                        <div class="flex flex-col justify-center pr-2 gap-2 action-container"></div>
                    `;
                    const actionContainer = row.querySelector('.action-container');
                    
                    const mainBtn = document.createElement('span');
                    mainBtn.className = "material-symbols-outlined text-[var(--game-color)] hover:scale-125 transition-transform";
                    mainBtn.innerText = "add_circle";
                    mainBtn.title = "Add to Main Deck";
                    mainBtn.onclick = (e) => addCard(e, card, false);
                    actionContainer.appendChild(mainBtn);

                    if (gameRules[activeGame].hasExtra) {
                        const extraBtn = document.createElement('span');
                        extraBtn.className = "material-symbols-outlined text-purple-400 hover:scale-125 transition-transform text-xs";
                        extraBtn.innerText = "library_add";
                        extraBtn.title = `Add to ${gameRules[activeGame].extraName}`;
                        extraBtn.onclick = (e) => addCard(e, card, true);
                        actionContainer.appendChild(extraBtn);
                    }
                    resultsContainer.appendChild(row);
                });
            } catch (err) {
                resultsContainer.innerHTML = '<p class="text-center text-xs text-error mt-10">No results found.</p>';
            }
        }
    });

    // --- 5. 添加逻辑与严格查错 ---
    function showMessage(msg, isError = false) {
        const sm = document.getElementById('systemMessage');
        sm.innerText = msg;
        sm.className = `text-xs font-label uppercase tracking-widest mt-1 ${isError ? 'text-error animate-pulse' : 'text-[var(--game-color)]'}`;
        setTimeout(() => { sm.innerText = "System Ready."; sm.className = "text-xs font-label uppercase tracking-widest mt-1 text-[var(--game-color)] opacity-70"; }, 3000);
    }

    function isCardUnlimited(card) {
        if (activeGame === 'pkmn') return card.type === 'Energy' && card.desc.includes('Basic');
        if (activeGame === 'mtg') return card.type.includes('Basic Land');
        return false;
    }

    function addCard(event, card, forceExtra) {
        event.stopPropagation(); 
        const rules = gameRules[activeGame];
        const currentDeck = decks[activeGame];
        
        let isExtra = forceExtra;
        if (activeGame === 'ygo' && !forceExtra) {
            const tLine = card.type.toLowerCase();
            if (tLine.includes('fusion') || tLine.includes('synchro') || tLine.includes('xyz') || tLine.includes('link')) {
                isExtra = true;
            }
        }

        const targetArray = isExtra ? currentDeck.extra : currentDeck.main;

        if (!isCardUnlimited(card)) {
            const countInMain = currentDeck.main.filter(c => c.name === card.name).length;
            const countInExtra = currentDeck.extra.filter(c => c.name === card.name).length;
            if (countInMain + countInExtra >= rules.maxCopies) {
                showMessage(`Rule Violation: Max ${rules.maxCopies} copies of "${card.name}".`, true);
                return;
            }
        }

        if (isExtra) {
            if (targetArray.length >= rules.extraMax) return showMessage(`${rules.extraName} Full!`, true);
        } else {
            if (targetArray.length >= rules.mainMax) return showMessage(`Main Deck Full!`, true);
        }

        targetArray.push(card);
        targetArray.sort((a, b) => a.name.localeCompare(b.name));
        showMessage(`Added ${card.name}.`);
        renderDeck();
    }

    function removeCard(index, isExtra) {
        if (isExtra) decks[activeGame].extra.splice(index, 1);
        else decks[activeGame].main.splice(index, 1);
        renderDeck();
    }

    function clearDeck() {
        if(confirm(`Clear the entire ${gameRules[activeGame].name} deck?`)) {
            decks[activeGame].main = []; decks[activeGame].extra = [];
            renderDeck();
        }
    }

    // --- 6. 🌟 保存、导出与导入核心逻辑 🌟 ---
    
    // 1. 保存在浏览器缓存中
    function saveDeckLocally() {
        localStorage.setItem('onboard_elite_decks', JSON.stringify(decks));
        showMessage("Deck successfully saved to browser!");
    }

    // 2. 导出为 Deck Code
    function exportDeck() {
        const currentDeck = decks[activeGame];
        if (currentDeck.main.length === 0 && currentDeck.extra.length === 0) {
            showMessage("Cannot share an empty deck!", true);
            return;
        }
        
        // 打包当前游戏环境和卡组数据
        const exportData = { game: activeGame, deck: currentDeck };
        
        // 转成 Base64 编码的 "神秘代码"
        const deckCode = btoa(encodeURIComponent(JSON.stringify(exportData)));
        
        // 尝试自动复制到剪贴板
        navigator.clipboard.writeText(deckCode).then(() => {
            alert("✅ Deck Code copied to clipboard! Share it with your friends.");
            showMessage("Code copied!");
        }).catch(() => {
            prompt("Here is your Deck Code. Copy it below:", deckCode);
        });
    }

    // 3. 导入 Deck Code
    function importDeck() {
        const deckCode = prompt("Paste the Deck Code you received here:");
        if (!deckCode) return;

        try {
            // 解析 "神秘代码"
            const parsedData = JSON.parse(decodeURIComponent(atob(deckCode)));
            
            if (!parsedData.game || !parsedData.deck) throw new Error("Format Corrupted");
            
            // 如果分享的是另一个游戏的卡组，自动帮用户切换过去！
            if (activeGame !== parsedData.game) {
                switchGame(parsedData.game);
            }

            // 覆盖当前卡组并渲染
            decks[activeGame] = parsedData.deck;
            renderDeck();
            saveDeckLocally(); // 自动保存一下
            
            alert("✨ Deck imported successfully!");
            showMessage("Deck imported!");
            
        } catch (error) {
            console.error(error);
            alert("❌ Invalid or corrupted Deck Code.");
            showMessage("Import Failed", true);
        }
    }

    // --- 7. 完美网格渲染 ---
    function renderDeckGroup(deckArray, containerElement, isExtra) {
        containerElement.innerHTML = '';
        if (deckArray.length === 0) return;

        const grouped = {};
        deckArray.forEach((card, index) => {
            let category = isExtra && activeGame === 'ygo' ? card.type : getCardCategory(activeGame, card.type);
            if (!grouped[category]) grouped[category] = [];
            grouped[category].push({ card, index }); 
        });

        for (const [category, items] of Object.entries(grouped)) {
            const groupDiv = document.createElement('div');
            groupDiv.className = "w-full mb-6"; 
            
            groupDiv.innerHTML = `
                <div class="flex justify-between items-end border-b border-surface-variant/50 pb-2 mb-4">
                    <h3 class="text-xs font-bold uppercase tracking-widest text-slate-300">${category}</h3>
                    <span class="text-[10px] font-label text-slate-400 bg-surface-container-highest px-2 py-0.5 rounded-full">${items.length}</span>
                </div>
                <div class="grid grid-cols-5 sm:grid-cols-6 md:grid-cols-8 lg:grid-cols-10 gap-3 pb-2"></div>
            `;
            
            const gridEl = groupDiv.querySelector('.grid');
            
            items.forEach(item => {
                const wrapper = document.createElement('div');
                wrapper.className = "w-full rounded shadow-md card-hover border border-transparent hover:border-error/80 transition-all overflow-hidden bg-surface-container-lowest cursor-pointer";
                wrapper.style = "aspect-ratio: 3/4;";
                wrapper.title = `${item.card.name} (Click to remove)`;
                wrapper.onclick = () => removeCard(item.index, isExtra);

                const img = document.createElement('img');
                img.src = item.card.img;
                img.className = "w-full h-full object-cover"; 
                
                wrapper.appendChild(img);
                gridEl.appendChild(wrapper);
            });
            containerElement.appendChild(groupDiv);
        }
    }

    function renderDeck() {
        const rules = gameRules[activeGame];
        const currentDeck = decks[activeGame];
        
        const mainCount = document.getElementById('mainDeckCount');
        mainCount.innerText = `${currentDeck.main.length} / ${rules.mainMax}`;
        mainCount.className = `font-label text-xs font-black px-3 py-1 rounded-full ${currentDeck.main.length < rules.mainMin ? 'bg-error/20 text-error' : 'bg-[var(--game-bg)] text-[var(--game-color)]'}`;

        document.getElementById('extraDeckCount').innerText = `${currentDeck.extra.length} / ${rules.extraMax}`;

        renderDeckGroup(currentDeck.main, document.getElementById('mainDeckGrid'), false);
        renderDeckGroup(currentDeck.extra, document.getElementById('extraDeckGrid'), true);
    }

    // --- 8. 启动应用：尝试读取本地缓存 ---
    function bootApp() {
        const savedDecks = localStorage.getItem('onboard_elite_decks');
        if (savedDecks) {
            try {
                decks = JSON.parse(savedDecks);
            } catch (e) {
                console.error("Cache decode error");
            }
        }
        switchGame('ygo'); // 默认打开 YGO
    }

    bootApp(); 
</script>
</body>
</html>
