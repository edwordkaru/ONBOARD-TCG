<main class="flex h-screen pt-20">
    
    <div class="flex-1 border-r border-surface-variant/50 p-6 overflow-y-auto no-scrollbar flex flex-col gap-6">
        <div class="flex justify-between items-end mb-2">

            </div>
            <div class="flex gap-4">
                <button onclick="clearDeck()" class="px-4 py-2 border border-error/50 text-error hover:bg-error/10 rounded-lg text-xs font-bold transition-all">Clear All</button>

            </div>
        </div>

            <div class="flex justify-between items-center border-b border-surface-variant pb-2 mb-4">
                <h2 class="font-headline font-bold text-lg">Main Deck</h2>
                <span id="mainDeckCount" class="font-label text-xs font-black bg-surface-variant px-2 py-1 rounded text-primary">0 / 60</span>
            </div>
            <div id="mainDeckGrid" class="grid grid-cols-10 gap-2">
                </div>

            <div class="flex justify-between items-center border-b border-surface-variant pb-2 mb-4">

                <span id="extraDeckCount" class="font-label text-xs font-black bg-surface-variant px-2 py-1 rounded text-[#ac89ff]">0 / 15</span>
            </div>
            <div id="extraDeckGrid" class="grid grid-cols-10 gap-2">
                </div>
        </div>
    </div>

    <div class="w-96 bg-surface-container border-l border-surface-variant/50 flex flex-col h-full relative z-10 shadow-2xl">
        <div class="p-6 border-b border-surface-variant/50 bg-[#0c0e11]">
            <h3 class="font-headline font-bold text-primary mb-4 flex items-center gap-2">
                <span class="material-symbols-outlined text-sm">database</span> Card Database
            </h3>
            <div class="relative">
                <input id="builderSearchInput" type="text" placeholder="Search card to add (Enter)..." class="w-full bg-[#171a1d] border border-surface-variant rounded-lg pl-10 pr-4 py-3 text-sm focus:ring-1 focus:ring-primary focus:border-primary transition-all">
                <span class="material-symbols-outlined absolute left-3 top-3.5 text-on-surface/50 text-sm">search</span>
            </div>
        </div>

        <div id="builderSearchResults" class="flex-1 overflow-y-auto p-4 space-y-3 no-scrollbar pb-24">
            <p class="text-center text-xs text-on-surface/40 mt-10">Search for a card to begin building.</p>
        </div>
    </div>

</main>

<script>
    // 状态管理：定义卡组数组
    let mainDeck = [];
    let extraDeck = [];
    
    // UI 元素绑定
    const searchInput = document.getElementById('builderSearchInput');
    const searchResults = document.getElementById('builderSearchResults');
    const mainDeckGrid = document.getElementById('mainDeckGrid');
    const extraDeckGrid = document.getElementById('extraDeckGrid');
    const mainDeckCount = document.getElementById('mainDeckCount');
    const extraDeckCount = document.getElementById('extraDeckCount');
    const systemMessage = document.getElementById('systemMessage');

    // 判断是否属于额外卡组 (包含这些关键字的必定是额外怪兽)
    function isExtraDeckCard(type) {
        return type.includes('Fusion') || type.includes('Synchro') || type.includes('XYZ') || type.includes('Link');
    }

    // 显示系统提示信息
    function showMessage(msg, isError = false) {
        systemMessage.innerText = msg;
        systemMessage.className = `text-xs font-label uppercase tracking-widest mt-1 ${isError ? 'text-error' : 'text-primary'}`;
        setTimeout(() => {
            systemMessage.innerText = "System Ready. Awaiting cards.";
            systemMessage.className = "text-xs text-on-surface/50 font-label uppercase tracking-widest mt-1";
        }, 3000);
    }

    // 搜索卡牌功能
    searchInput.addEventListener('keypress', async function (e) {
        if (e.key === 'Enter') {
            const query = searchInput.value.trim();
            if (!query) return;

            searchResults.innerHTML = '<p class="text-center text-xs text-primary mt-10 animate-pulse">Searching database...</p>';

            try {
                // 使用模糊搜索 API
                const response = await fetch(`https://db.ygoprodeck.com/api/v7/cardinfo.php?fname=${encodeURIComponent(query)}`);
                const data = await response.json();

                if (data.error) {
                    searchResults.innerHTML = '<p class="text-center text-xs text-error mt-10">Card not found.</p>';
                    return;
                }

                searchResults.innerHTML = ''; // 清空提示
                
                // 为了避免卡顿，只渲染前20个搜索结果
                const cardsToDisplay = data.data.slice(0, 20);

                cardsToDisplay.forEach(card => {
                    const imgUrl = card.card_images[0].image_url_small; // 搜索栏用小图省流量
                    const cardType = card.type;
                    
                    // 构建右侧搜索结果的每一行
                    const cardRow = document.createElement('div');
                    cardRow.className = "flex gap-3 bg-[#111417] p-2 rounded-lg border border-transparent hover:border-primary/30 cursor-pointer transition-all hover:bg-[#171a1d]";
                    cardRow.innerHTML = `
                        <img src="${imgUrl}" alt="${card.name}" class="w-12 rounded shadow-md">
                        <div class="flex-1 py-1 flex flex-col justify-between overflow-hidden">
                            <h4 class="font-headline font-bold text-sm text-white truncate">${card.name}</h4>
                            <p class="font-label text-[10px] text-primary truncate">${card.race} ${cardType.includes('Monster') ? 'Monster' : cardType}</p>
                        </div>
                        <div class="flex items-center pr-2">
                            <span class="material-symbols-outlined text-primary hover:scale-125 transition-transform">add_circle</span>
                        </div>
                    `;

                    // 点击整行触发添加卡牌逻辑
                    cardRow.onclick = () => addCardToDeck(card);
                    searchResults.appendChild(cardRow);
                });

            } catch (err) {
                searchResults.innerHTML = '<p class="text-center text-xs text-error mt-10">Network error.</p>';
            }
        }
    });

    // 核心逻辑：添加卡牌到卡组
    function addCardToDeck(cardData) {
        const isExtra = isExtraDeckCard(cardData.type);
        const targetDeck = isExtra ? extraDeck : mainDeck;
        
        // 规则 1: 检查同名卡是否超过 3 张
        const countInMain = mainDeck.filter(c => c.name === cardData.name).length;
        const countInExtra = extraDeck.filter(c => c.name === cardData.name).length;
        if (countInMain + countInExtra >= 3) {
            showMessage(`Rule Violation: You cannot have more than 3 copies of "${cardData.name}".`, true);
            return;
        }

        // 规则 2: 检查 Main Deck 上限 (60)
        if (!isExtra && mainDeck.length >= 60) {
            showMessage("Rule Violation: Main Deck limit reached (60 max).", true);
            return;
        }

        // 规则 3: 检查 Extra Deck 上限 (15)
        if (isExtra && extraDeck.length >= 15) {
            showMessage("Rule Violation: Extra Deck limit reached (15 max).", true);
            return;
        }

        // 添加卡牌到对应的数组
        targetDeck.push(cardData);
        
        // 按照名字排序，让同名卡排在一起，看起来更舒服
        targetDeck.sort((a, b) => a.name.localeCompare(b.name));
        
        showMessage(`Added ${cardData.name} to ${isExtra ? 'Extra' : 'Main'} Deck.`);
        renderDeck(); // 刷新 UI
    }

    // 从卡组中移除卡牌
    function removeCardFromDeck(index, isExtra) {
        if (isExtra) {
            extraDeck.splice(index, 1);
        } else {
            mainDeck.splice(index, 1);
        }
        renderDeck(); // 刷新 UI
    }

    // 清空卡组
    function clearDeck() {
        if(confirm("Are you sure you want to clear your entire deck?")) {
            mainDeck = [];
            extraDeck = [];
            renderDeck();
            showMessage("Deck cleared.");
        }
    }

    // 渲染卡组 UI (更新图片网格和数字统计)
    function renderDeck() {
        // 更新数字
        mainDeckCount.innerText = `${mainDeck.length} / 60`;
        extraDeckCount.innerText = `${extraDeck.length} / 15`;
        
        // 警告颜色处理 (主卡组低于40时标红警告)
        mainDeckCount.className = `font-label text-xs font-black px-2 py-1 rounded ${mainDeck.length < 40 ? 'bg-error/20 text-error' : 'bg-primary/20 text-primary'}`;

        // 清空网格
        mainDeckGrid.innerHTML = '';
        extraDeckGrid.innerHTML = '';

        // 渲染主卡组
        mainDeck.forEach((card, index) => {
            const img = document.createElement('img');
            img.src = card.card_images[0].image_url_small; // 这里用小图加载快，正式版可换高清
            img.className = "w-full aspect-[3/4] object-cover rounded shadow-md card-hover border border-transparent hover:border-error/80 transition-all";
            img.title = `${card.name} (Click to remove)`;
            img.onclick = () => removeCardFromDeck(index, false); // 点击移除
            mainDeckGrid.appendChild(img);
        });

        // 渲染额外卡组
        extraDeck.forEach((card, index) => {
            const img = document.createElement('img');
            img.src = card.card_images[0].image_url_small;
            img.className = "w-full aspect-[3/4] object-cover rounded shadow-md card-hover border border-transparent hover:border-error/80 transition-all";
            img.title = `${card.name} (Click to remove)`;
            img.onclick = () => removeCardFromDeck(index, true); // 点击移除
            extraDeckGrid.appendChild(img);
        });
    }

    // 初始化渲染一次
    renderDeck();
</script>
