<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Digital Vault | Card Detail</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#69daff",
            "secondary": "#ac89ff",
            "tertiary": "#ff6e85",
            "error": "#ff716c",
            "background": "#0c0e11",
            "surface-container": "#171a1d",
            "surface-container-low": "#111417",
            "surface-container-highest": "#23262a",
            "on-surface": "#f9f9fd",
            "on-surface-variant": "#aaabaf",
            "outline-variant": "#46484b",
          },
          fontFamily: {
            "headline": ["Space Grotesk"],
            "body": ["Manrope"],
            "label": ["Inter"]
          }
        }
      }
    }
  </script>
<style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .glass-effect { background: rgba(35, 38, 42, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(105, 218, 255, 0.1); }
    .card-glow { box-shadow: 0 0 40px rgba(105, 218, 255, 0.15); }
    /* 游戏主题色变量 */
    .theme-ygo { --game-color: #69daff; }
    .theme-pkmn { --game-color: #ffcb05; }
    .theme-mtg { --game-color: #ff7a00; }
  </style>
</head>
<body id="appBody" class="bg-background text-on-surface font-body selection:bg-[var(--game-color)] selection:text-background theme-ygo">

<header class="bg-[#0c0e11] flex justify-between items-center w-full px-6 py-4 h-20 top-0 z-50 border-b border-[#23262a]/30 shadow-[0_24px_48px_rgba(0,0,0,0.4)] fixed">
    <div class="flex items-center w-1/4">
        <a href="index.html" class="flex items-center gap-3 group cursor-pointer">
            <img alt="Onboard Logo" class="h-10 w-10 object-contain" src="https://lh3.googleusercontent.com/aida/ADBb0uj9tE9aJKEn5prVJMPWSgFkk86I0ROmzEbe9DLWImJa6WmhhTwNiexAOFgaa0qw-nqqXLN0nkYatbrxIlr8Hf_AJ1jP8ty6nkmmKZrbCfcODygZXShyfyNyjEDsqJU1pq484mK5EQn-VH3pukRhsNvEcCsGqvFkeqdzqnqLszir-RaIJGyhQZ8vPB0tMBvjV-9LK9D4wbNOLYsxk5_IUMQkrTobNro4pD_NzWb03P6qX3AcH5Ari1ilEPkn"/>
            <span class="text-4xl font-bold tracking-tight text-[var(--game-color)] font-headline transition-colors">Onboard</span>
        </a>
    </div>
    <nav class="flex-1 flex justify-center items-center gap-12 font-headline font-medium tracking-[0.1em] text-[13px] uppercase">
        <a class="text-[#f9f9fd]/50 hover:text-[var(--game-color)] transition-colors whitespace-nowrap" href="onboard_search_results_standardized_header.html">Market</a>
        <a class="text-[#f9f9fd]/50 hover:text-[var(--game-color)] transition-colors whitespace-nowrap" href="onboard_watchlist_standardized_header.html">Watchlist</a>
        <a class="text-[#f9f9fd]/50 hover:text-[var(--game-color)] transition-colors whitespace-nowrap" href="onboard_deck_builder_standardized_header.html">Deck Builder</a>
        <a class="text-[#f9f9fd]/50 hover:text-[var(--game-color)] transition-colors whitespace-nowrap" href="onboard_my_collection_standardized_header.html">Collection</a>
        <a class="text-[#f9f9fd]/50 hover:text-[var(--game-color)] transition-colors whitespace-nowrap" href="onboard_seller_hub_standardized_header.html">Seller Hub</a>
    </nav>
    <div class="flex items-center justify-end gap-4 w-1/4">
        <div class="flex items-center gap-1">
            <button class="p-2 hover:bg-[#171a1d] transition-all duration-200 rounded-full relative">
                <span class="material-symbols-outlined text-[var(--game-color)]">notifications</span>
            </button>
            <div class="w-9 h-9 rounded-full bg-surface-container-highest overflow-hidden ml-2 border border-outline-variant/30">
                <img class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD1oC1axstDPvxy7g1rpa1_R6WaPvmsh6MRPV0VwxQRnTw8Gu3CAPYaQa5-Abo2LOBz6PMcEITb2LwEQSjnTuAAltject8-5saG4CHFctYnNjlfOh3UjZHrafjYddc6TToIgQoMILhFGG9zd3QNBuOR4BZVPGts3XLzOlWLVtH7fCo7ljv7hH8KFncJ3E519BRvYCOyUv6zZEGUBDclxtioynXYzA48ymxdytXG1DU2Vo0e0y7APgrH1gCQ6Zj__67IsWDQn0XRCEnB"/>
            </div>
        </div>
    </div>
</header>

<main class="pt-32 pb-20 px-6 max-w-7xl mx-auto min-h-screen" id="mainContent">
    <div id="loadingState" class="flex flex-col items-center justify-center py-32">
        <span class="material-symbols-outlined text-6xl animate-spin text-[var(--game-color)] mb-4">refresh</span>
        <h2 class="font-headline text-2xl text-white">Decrypting Asset Data...</h2>
        <p class="text-slate-500 mt-2">Connecting to global market nodes</p>
    </div>

    <div id="cardDetailState" class="hidden">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-12 items-start">
            <div class="lg:col-span-5 flex flex-col gap-6 sticky top-32">
                <div class="relative group">
                    <div class="absolute -inset-4 bg-gradient-to-tr from-[var(--game-color)]/20 to-secondary/20 blur-3xl rounded-full opacity-50"></div>
                    <div class="relative rounded-3xl overflow-hidden glass-effect p-4 card-glow transition-transform duration-500 hover:scale-[1.02] bg-black">
                        <img id="detailImage" class="w-full h-auto rounded-2xl shadow-2xl object-cover" src="" alt="Card Image"/>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <button class="bg-[var(--game-color)] text-black font-headline font-bold py-4 rounded-full flex items-center justify-center gap-2 hover:brightness-110 active:scale-95 transition-all">
                        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">add_circle</span> Add to Deck
                    </button>
                    <button class="bg-surface-container-highest border border-outline-variant/30 text-on-surface font-headline font-bold py-4 rounded-full flex items-center justify-center gap-2 hover:bg-surface-container transition-all">
                        <span class="material-symbols-outlined">favorite</span> Watchlist
                    </button>
                </div>
            </div>

            <div class="lg:col-span-7 flex flex-col gap-10">
                <div>
                    <div class="flex items-center gap-3 mb-2" id="badgesContainer">
                        </div>
                    <h1 id="detailName" class="text-5xl lg:text-6xl font-headline font-extrabold tracking-tighter text-on-surface mb-4">Loading...</h1>
                    <p id="detailDesc" class="text-on-surface-variant font-body text-lg leading-relaxed max-w-xl bg-surface-container-low/50 p-4 rounded-xl border border-white/5 italic">
                        ...
                    </p>
                </div>

                <div class="grid grid-cols-2 md:grid-cols-4 gap-4" id="specGrid">
                    </div>

                <div class="bg-surface-container-highest rounded-3xl p-8 glass-effect border border-[var(--game-color)]/20 shadow-[0_0_30px_rgba(var(--game-color-rgb),0.1)]">
                    <div class="flex items-end justify-between mb-6">
                        <div>
                            <p class="font-label text-[10px] text-on-surface-variant uppercase tracking-widest mb-1">Base Market Value (TCGPlayer)</p>
                            <h2 id="basePrice" class="text-5xl font-headline font-black text-on-surface">$0.00</h2>
                        </div>
                        <div class="text-right">
                            <span class="flex items-center gap-1 text-[var(--game-color)] font-headline font-bold text-xl">
                                <span class="material-symbols-outlined">trending_up</span> LIVE API
                            </span>
                        </div>
                    </div>
                </div>

                <section class="mt-8">
                    <div class="flex items-center justify-between mb-6">
                        <h3 class="text-3xl font-headline font-bold tracking-tight">Marketplace Intelligence</h3>
                        <div class="flex gap-2">
                            <span class="flex items-center gap-1 text-[11px] font-label text-on-surface-variant">
                                <span class="w-2 h-2 rounded-full bg-[var(--game-color)] animate-pulse"></span> LIVE SYNC
                            </span>
                        </div>
                    </div>
                    
                    <div class="bg-surface-container-low rounded-3xl overflow-hidden border border-outline-variant/10">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-surface-container border-b border-outline-variant/10">
                                    <th class="py-5 px-6 font-label text-[11px] text-slate-400 uppercase tracking-widest">Vendor</th>
                                    <th class="py-5 px-6 font-label text-[11px] text-slate-400 uppercase tracking-widest hidden md:table-cell">Region</th>
                                    <th class="py-5 px-6 font-label text-[11px] text-slate-400 uppercase tracking-widest">Market Price</th>
                                    <th class="py-5 px-6 text-right font-label text-[11px] text-slate-400 uppercase tracking-widest">Action</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-outline-variant/5" id="vendorTableBody">
                                </tbody>
                        </table>
                    </div>
                </section>
            </div>
        </div>
    </div>
</main>

<script>
    // 1. 读取网址参数 (例如: ?game=ygo&id=46986414)
    const urlParams = new URLSearchParams(window.location.search);
    const game = urlParams.get('game') || 'ygo'; // 默认游戏王
    // 如果没有 ID，默认加载黑魔导的 ID 用于演示
    const cardId = urlParams.get('id') || '46986414'; 

    // 设置主题色
    document.getElementById('appBody').className = `bg-background text-on-surface font-body selection:bg-[var(--game-color)] selection:text-background theme-${game}`;

    // DOM 元素绑定
    const loadingState = document.getElementById('loadingState');
    const cardDetailState = document.getElementById('cardDetailState');
    const detailImage = document.getElementById('detailImage');
    const detailName = document.getElementById('detailName');
    const detailDesc = document.getElementById('detailDesc');
    const badgesContainer = document.getElementById('badgesContainer');
    const specGrid = document.getElementById('specGrid');
    const basePrice = document.getElementById('basePrice');
    const vendorTableBody = document.getElementById('vendorTableBody');

    // 2. 获取卡牌数据的核心函数
    async function fetchCardDetails() {
        try {
            let cardData = null;
            let prices = {};

            if (game === 'ygo') {
                const res = await fetch(`https://db.ygoprodeck.com/api/v7/cardinfo.php?id=${cardId}`);
                const data = await res.json();
                const c = data.data[0];
                
                cardData = {
                    name: c.name,
                    img: c.card_images[0].image_url,
                    desc: c.desc,
                    type: c.type,
                    race: c.race,
                    attribute: c.attribute || 'N/A',
                    level: c.level ? `Level ${c.level}` : (c.linkval ? `Link ${c.linkval}` : 'N/A')
                };
                
                // 获取 5 个市场的真实价格
                const p = c.card_prices[0];
                prices = [
                    { vendor: "TCGPlayer", icon: "shopping_cart", region: "North America", price: p.tcgplayer_price, color: "text-primary" },
                    { vendor: "Cardmarket", icon: "explore", region: "Europe", price: p.cardmarket_price, color: "text-secondary" },
                    { vendor: "eBay", icon: "gavel", region: "Global Auction", price: p.ebay_price, color: "text-tertiary" },
                    { vendor: "Amazon", icon: "storefront", region: "Retail Direct", price: p.amazon_price, color: "text-orange-400" },
                    { vendor: "CoolStuffInc", icon: "auto_awesome", region: "Premium Retail", price: p.coolstuffinc_price, color: "text-emerald-400" }
                ];
            } 
            else if (game === 'pkmn') {
                const res = await fetch(`https://api.pokemontcg.io/v2/cards/${cardId}`);
                const data = await res.json();
                const c = data.data;
                
                cardData = {
                    name: c.name,
                    img: c.images.large,
                    desc: c.flavorText || (c.attacks ? c.attacks.map(a => a.name).join(' / ') : c.supertype),
                    type: c.supertype,
                    race: c.subtypes ? c.subtypes.join(', ') : 'N/A',
                    attribute: c.types ? c.types.join(', ') : 'N/A',
                    level: c.hp ? `HP ${c.hp}` : 'N/A'
                };

                const baseP = c.tcgplayer?.prices?.holofoil?.market || c.tcgplayer?.prices?.normal?.market || 0;
                // 模拟 5 个市场价格波动
                prices = [
                    { vendor: "TCGPlayer", icon: "shopping_cart", region: "North America", price: baseP, color: "text-primary" },
                    { vendor: "Cardmarket", icon: "explore", region: "Europe", price: (baseP * 0.9).toFixed(2), color: "text-secondary" },
                    { vendor: "eBay", icon: "gavel", region: "Global Auction", price: (baseP * 1.1).toFixed(2), color: "text-tertiary" },
                    { vendor: "Troll & Toad", icon: "storefront", region: "Direct Seller", price: (baseP * 1.05).toFixed(2), color: "text-orange-400" },
                    { vendor: "CoolStuffInc", icon: "auto_awesome", region: "Premium Retail", price: (baseP * 0.95).toFixed(2), color: "text-emerald-400" }
                ];
            }
            else if (game === 'mtg') {
                const res = await fetch(`https://api.scryfall.com/cards/${cardId}`);
                const c = await res.json();
                
                cardData = {
                    name: c.name,
                    img: c.image_uris ? c.image_uris.normal : (c.card_faces ? c.card_faces[0].image_uris.normal : ''),
                    desc: c.oracle_text || 'No description available.',
                    type: c.type_line,
                    race: c.set_name,
                    attribute: c.mana_cost || 'Land',
                    level: c.rarity
                };

                const baseP = c.prices?.usd || c.prices?.usd_foil || 0;
                prices = [
                    { vendor: "TCGPlayer", icon: "shopping_cart", region: "North America", price: baseP, color: "text-primary" },
                    { vendor: "Cardmarket", icon: "explore", region: "Europe", price: c.prices?.eur || (baseP * 0.9).toFixed(2), color: "text-secondary" },
                    { vendor: "eBay", icon: "gavel", region: "Global Auction", price: (baseP * 1.1).toFixed(2), color: "text-tertiary" },
                    { vendor: "MTGO", icon: "computer", region: "Digital Market", price: c.prices?.tix || "0.00", color: "text-blue-400" },
                    { vendor: "CoolStuffInc", icon: "auto_awesome", region: "Premium Retail", price: (baseP * 0.95).toFixed(2), color: "text-emerald-400" }
                ];
            }

            renderDetails(cardData, prices);

        } catch (error) {
            console.error(error);
            loadingState.innerHTML = `<span class="material-symbols-outlined text-6xl text-error mb-4">error</span><h2 class="font-headline text-2xl text-error">Asset Decryption Failed</h2><p class="text-slate-500 mt-2">Could not find card ID: ${cardId}</p>`;
        }
    }

    // 3. 渲染数据到页面
    function renderDetails(card, prices) {
        // 隐藏加载，显示内容
        loadingState.style.display = 'none';
        cardDetailState.style.display = 'block';

        // 基础信息
        detailImage.src = card.img;
        detailName.innerText = card.name;
        detailDesc.innerText = card.desc;

        // 标签 (Badges)
        badgesContainer.innerHTML = `
            <span class="bg-[var(--game-color)]/20 text-[var(--game-color)] px-3 py-1 rounded-full font-label text-[10px] uppercase tracking-widest font-bold border border-[var(--game-color)]/30">${card.type}</span>
            <span class="bg-surface-container-highest text-white px-3 py-1 rounded-full font-label text-[10px] uppercase tracking-widest font-bold border border-white/10">${card.race}</span>
        `;

        // 规格表格 (Specs)
        specGrid.innerHTML = `
            <div class="bg-surface-container-low p-5 rounded-2xl border border-outline-variant/10">
                <p class="font-label text-[10px] text-slate-500 uppercase tracking-widest mb-1">Category</p>
                <p class="font-headline font-bold text-white truncate" title="${card.type}">${card.type}</p>
            </div>
            <div class="bg-surface-container-low p-5 rounded-2xl border border-outline-variant/10">
                <p class="font-label text-[10px] text-slate-500 uppercase tracking-widest mb-1">Subtype / Race</p>
                <p class="font-headline font-bold text-white truncate" title="${card.race}">${card.race}</p>
            </div>
            <div class="bg-surface-container-low p-5 rounded-2xl border border-outline-variant/10">
                <p class="font-label text-[10px] text-slate-500 uppercase tracking-widest mb-1">Attribute / Cost</p>
                <p class="font-headline font-bold text-[var(--game-color)]">${card.attribute}</p>
            </div>
            <div class="bg-surface-container-low p-5 rounded-2xl border border-outline-variant/10">
                <p class="font-label text-[10px] text-slate-500 uppercase tracking-widest mb-1">Level / HP / Rarity</p>
                <p class="font-headline font-bold text-white">${card.level}</p>
            </div>
        `;

        // 设置主展示价格 (取 TCGPlayer)
        basePrice.innerText = `$${prices[0].price || '0.00'}`;

        // 渲染 5 个对比市场
        vendorTableBody.innerHTML = '';
        prices.forEach(v => {
            const displayPrice = v.price ? `$${v.price}` : 'Out of Stock';
            const disableBtn = !v.price || v.price == 0 ? 'opacity-50 cursor-not-allowed' : 'hover:bg-surface-bright';
            
            const row = `
                <tr class="hover:bg-surface-container-highest transition-colors group">
                    <td class="py-4 px-6">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-lg bg-surface-container-lowest flex items-center justify-center border border-outline-variant/20">
                                <span class="material-symbols-outlined ${v.color}">${v.icon}</span>
                            </div>
                            <div>
                                <p class="font-headline font-bold text-white">${v.vendor}</p>
                            </div>
                        </div>
                    </td>
                    <td class="py-4 px-6 hidden md:table-cell">
                        <span class="text-xs text-slate-400 font-label tracking-widest uppercase">${v.region}</span>
                    </td>
                    <td class="py-4 px-6">
                        <p class="font-headline font-black text-xl text-[var(--game-color)]">${displayPrice}</p>
                    </td>
                    <td class="py-4 px-6 text-right">
                        <button class="bg-surface-container text-white border border-outline-variant/40 px-6 py-2 rounded-full font-headline font-bold text-xs transition-all ${disableBtn}">Check Store</button>
                    </td>
                </tr>
            `;
            vendorTableBody.insertAdjacentHTML('beforeend', row);
        });
    }

    // 启动拉取
    fetchCardDetails();

</script>
</body>
</html>
